<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Analytics Dashboard v2</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
  h1 { text-align: center; }
  .card { display: inline-block; width: 180px; padding: 10px; margin: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
  th { background: #f0f0f0; }
</style>
</head>
<body>

<h1>Analytics Dashboard v2</h1>

<div id="cards">
  <div class="card">PV: <span id="pv">0</span></div>
  <div class="card">UV: <span id="uv">0</span></div>
  <div class="card">Avg Duration: <span id="avgDuration">0</span>s</div>
  <div class="card">Today PV: <span id="todayPV">0</span></div>
</div>

<h2>Top Pages</h2>
<table>
  <thead>
    <tr><th>Path</th><th>Count</th></tr>
  </thead>
  <tbody id="topPages"></tbody>
</table>

<script>
async function loadStats() {
  try {
    const res = await fetch('https://view.zyq1569.workers.dev/stats');
    const data = await res.json();

    document.getElementById('pv').textContent = data.pv;
    document.getElementById('uv').textContent = data.uv;
    document.getElementById('avgDuration').textContent = data.avgDuration;
    document.getElementById('todayPV').textContent = data.todayPV;

    const tbody = document.getElementById('topPages');
    tbody.innerHTML = '';
    data.topPages.forEach(page => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${page.path}</td><td>${page.count}</td>`;
      tbody.appendChild(tr);
    });
  } catch (err) {
    console.error('Failed to load stats', err);
  }
}

// 首次載入
loadStats();

// 可選：每分鐘刷新一次
setInterval(loadStats, 60000);
</script>

</body>
</html>
