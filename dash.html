<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Mini Analytics Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h1 { text-align: center; }
  .stat { margin: 10px 0; }
  .chart { width: 200px; height: 150px; display: inline-block; margin: 10px; }
  pre { background: #eee; padding: 10px; border-radius: 5px; overflow-x: auto; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>📊 Mini Analytics Dashboard</h1>

<div id="stats">
  <div class="stat">PV: <span id="pv">0</span></div>
  <div class="stat">UV: <span id="uv">0</span></div>
  <div class="stat">平均停留時間: <span id="avgDuration">0</span> 秒</div>
</div>

<div id="charts">
  <canvas id="countryChart" class="chart"></canvas>
</div>

<h2>🔥 熱門頁面</h2>
<pre id="popular"></pre>

<script>
async function fetchData() {
  const res = await fetch("https://view.zyq1569.workers.dev/stats");
  const data = await res.json();
  return data;
}

function computeStats(data) {
  const pv = data.length;
  const uv = new Set(data.map(d => d.ip)).size;
  const durations = data.map(d => d.duration || 0);
  const avgDuration = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : 0;

  const countries = {};
  data.forEach(d => { countries[d.country] = (countries[d.country]||0)+1; });

  const pages = {};
  data.forEach(d => { pages[d.path] = (pages[d.path]||0)+1; });
  const popular = Object.entries(pages).sort((a,b)=>b[1]-a[1]);

  return { pv, uv, avgDuration, countries, popular };
}

function renderCharts(stats) {
  const ctx = document.getElementById('countryChart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(stats.countries),
      datasets: [{
        label: '訪問國家分佈',
        data: Object.values(stats.countries),
        backgroundColor: ['#4caf50','#2196f3','#ff9800','#f44336','#9c27b0','#00bcd4']
      }]
    },
    options: {
      responsive: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });

  document.getElementById('popular').innerText = stats.popular.map(p=>`${p[0]}: ${p[1]} 次`).join('\n');
  document.getElementById('pv').innerText = stats.pv;
  document.getElementById('uv').innerText = stats.uv;
  document.getElementById('avgDuration').innerText = stats.avgDuration;
}

async function init() {
  const data = await fetchData();
  const stats = computeStats(data);
  renderCharts(stats);
}

init();
</script>

</body>
</html>
