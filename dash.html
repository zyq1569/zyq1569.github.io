                    labelStyle={{ color: 'var(--text)', fontWeight: 600 }}
                    itemStyle={{ color: 'var(--accent)' }}
                    formatter={(value) => [fmtNum(value), 'Pageviews']}
                  />
                  <Area
                    type="monotone"
                    dataKey="count"
                    stroke="var(--accent)"
                    strokeWidth={2}
                    fill="url(#trafficGradient)"
                    animationDuration={900}
                    activeDot={{ r: 5, strokeWidth: 0 }}
                  />
                </AreaChart>
              </ResponsiveContainer>
            </div>
          )}
        </div>
      );
    }

    // ============================================================
    // TOP PAGES (with referrer drill-down)
    // ============================================================
    function TopPagesCard({ paths, total, client, dateRange, demoMode, demoRefs }) {
      const [expanded, setExpanded] = useState(null);
      const [refData, setRefData] = useState({});
      const [refLoading, setRefLoading] = useState(null);
      const [showAll, setShowAll] = useState(false);

      useEffect(() => {
        setExpanded(null);
        setRefData({});
      }, [dateRange]);

      // Normalize: GoatCounter returns `path_id`; older docs/snapshots used `id`. Use whichever is present.
      const items = useMemo(
        () => (paths || []).map(p => ({ ...p, id: p.path_id ?? p.id })).sort((a, b) => b.count - a.count),
        [paths]
      );
      const visible = showAll ? items : items.slice(0, 8);
      const max = Math.max(1, ...(items.map(p => p.count)));

      const handleClick = useCallback(async (item) => {
        if (expanded === item.id) { setExpanded(null); return; }
        setExpanded(item.id);
        if (refData[item.id]) return;
        // Demo mode: serve refs from the static lookup, no network call.
        if (demoMode) {
          const refs = (demoRefs && demoRefs[item.path]) || [];
          setRefData(prev => ({ ...prev, [item.id]: refs }));
          return;
        }
        setRefLoading(item.id);
        try {
          const url = `/api/v0/stats/hits/${item.id}?start=${encodeURIComponent(dateRange.start)}&end=${encodeURIComponent(dateRange.end)}&limit=10`;
          const data = await client.request(url);
          setRefData(prev => ({ ...prev, [item.id]: data.refs || [] }));
        } catch (e) {
          setRefData(prev => ({ ...prev, [item.id]: { error: e.message } }));
        } finally {
          setRefLoading(null);
        }
      }, [expanded, refData, client, dateRange, demoMode, demoRefs]);

      return (
        <div className="card fade-in">
          <div className="card-header">
            <div>
              <h3 className="card-title">Top pages</h3>
              <p className="card-subtitle">Click any page to see its referrers</p>
            </div>
            <span className="card-subtitle">{items.length} paths</span>
          </div>
          {!items.length ? (
            <div className="empty-state">No page data.</div>
          ) : (
            <ul className="row-list">
              {visible.map((p) => {
                const widthPct = (p.count / max) * 100;
                const sharePct = total > 0 ? (p.count / total) * 100 : 0;
                const isOpen = expanded === p.id;
                return (
                  <React.Fragment key={p.id}>
                    <li
                      className="row-item clickable"
                      onClick={() => handleClick(p)}
                      role="button"
                      tabIndex={0}
                      onKeyDown={(e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleClick(p); } }}
                      aria-expanded={isOpen}
                    >
                      <span className="row-name truncate" title={p.path}>
                        <span className={'row-chevron' + (isOpen ? ' open' : '')} aria-hidden="true">▸</span>
                        {p.path}
                        {p.title ? <span className="muted"> — {p.title}</span> : null}
                      </span>
                      <span>
                        <span className="row-value">{fmtNum(p.count)}</span>
                        <span className="row-pct">{sharePct.toFixed(1)}%</span>
                      </span>
                      <span className="row-bar" style={{ width: widthPct + '%' }} />
                    </li>
                    {isOpen && (
                      <li className="ref-panel">
                        <p className="ref-panel-title">Top referrers for {p.path}</p>
                        {refLoading === p.id && <div style={{fontSize:'0.82rem', color:'var(--text-muted)'}}>Loading…</div>}
                        {refData[p.id] && Array.isArray(refData[p.id]) && refData[p.id].length === 0 && (
                          <div style={{fontSize:'0.82rem', color:'var(--text-muted)'}}>No referrers tracked.</div>
                        )}
                        {refData[p.id] && refData[p.id].error && (
                          <div style={{fontSize:'0.82rem', color:'var(--danger)'}}>{refData[p.id].error}</div>
                        )}
                        {Array.isArray(refData[p.id]) && refData[p.id].length > 0 && (
                          <ul className="ref-list">
                            {refData[p.id].slice(0, 8).map((r, i) => (
                              <li key={i}>
                                <span className="ref-name">{r.name || '(direct)'}</span>
                                <span className="row-value">{fmtNum(r.count)}</span>
                              </li>
                            ))}
                          </ul>
                        )}
                      </li>
                    )}
                  </React.Fragment>
                );
              })}
            </ul>
          )}
          {items.length > 8 && (
            <button className="show-more" onClick={() => setShowAll(s => !s)}>
              {showAll ? 'Show less' : `Show all (${items.length})`}
            </button>
          )}
        </div>
      );
    }

    // ============================================================
    // GENERIC TOP-LIST CARD (referrers, etc.)
    // ============================================================
    // `topSlot`: optional React node rendered between the card header and the
    // list (used by the Countries card to slot the world map above the list).
    function TopListCard({ title, subtitle, stats, prefix, formatName, topSlot, client, dateRange, demoMode, page, demoDetails }) {
      const [showAll, setShowAll] = useState(false);
      const [expanded, setExpanded] = useState(null);
      const [detailData, setDetailData] = useState({});
      const [detailLoading, setDetailLoading] = useState(null);

      useEffect(() => {
        setExpanded(null);
        setDetailData({});
      }, [dateRange]);

      const items = useMemo(() => (stats || []).slice().sort((a,b) => b.count - a.count), [stats]);
      const total = items.reduce((s, x) => s + (x.count || 0), 0);
      const max = Math.max(1, ...(items.map(x => x.count)));
      const visible = showAll ? items : items.slice(0, 8);
      const canDrill = !!((client || demoMode) && page);

      const handleDrilldown = useCallback(async (item) => {
        const itemId = item.id || item.name || '';
        if (expanded === itemId) { setExpanded(null); return; }
        setExpanded(itemId);
        if (detailData[itemId]) return;
        if (demoMode) {
          const details = (demoDetails && demoDetails[itemId]) || [];
          setDetailData(prev => ({ ...prev, [itemId]: details }));
          return;
        }
        setDetailLoading(itemId);
        try {
          const url = `/api/v0/stats/${page}/${encodeURIComponent(itemId)}?start=${encodeURIComponent(dateRange.start)}&end=${encodeURIComponent(dateRange.end)}&limit=10`;
          const res = await client.request(url);
          setDetailData(prev => ({ ...prev, [itemId]: res.stats || [] }));
        } catch (e) {
          setDetailData(prev => ({ ...prev, [itemId]: { error: e.message } }));
        } finally {
          setDetailLoading(null);
        }
      }, [expanded, detailData, client, dateRange, demoMode, demoDetails, page]);

      return (
        <div className="card fade-in">
          <div className="card-header">
            <h3 className="card-title">{title}</h3>
            {subtitle && <span className="card-subtitle">{subtitle}</span>}
          </div>
          {topSlot && canDrill ? React.cloneElement(topSlot, { highlightCountry: expanded }) : topSlot}
          {!items.length ? (
            <div className="empty-state">No data.</div>
          ) : (
            <ul className="row-list">
              {visible.map((x, i) => {
                const widthPct = (x.count / max) * 100;
                const sharePct = total > 0 ? (x.count / total) * 100 : 0;
                const itemId = x.id || x.name || '';
                const isOpen = expanded === itemId;
                const detail = detailData[itemId];
                const detailMax = Array.isArray(detail) ? Math.max(1, ...detail.map(r => r.count || 0)) : 1;
                return (
                  <React.Fragment key={i}>
                    <li
                      className={'row-item' + (canDrill ? ' clickable' : '')}
                      onClick={canDrill ? () => handleDrilldown(x) : undefined}
                      role={canDrill ? 'button' : undefined}
                      tabIndex={canDrill ? 0 : undefined}
                      onKeyDown={canDrill ? (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleDrilldown(x); } } : undefined}
                      aria-expanded={canDrill ? isOpen : undefined}
                    >
                      <span className="row-name truncate" title={x.name}>
                        {canDrill && <span className={'row-chevron' + (isOpen ? ' open' : '')} aria-hidden="true">▸</span>}
                        {prefix ? prefix(x) : null}
                        {formatName ? formatName(x) : (x.name || '(none)')}
                      </span>
                      <span>
                        <span className="row-value">{fmtNum(x.count)}</span>
                        <span className="row-pct">{sharePct.toFixed(1)}%</span>
                      </span>
                      <span className="row-bar" style={{ width: widthPct + '%' }} />
                    </li>
                    {canDrill && isOpen && (
                      <li className="ref-panel">
                        <p className="ref-panel-title">{x.name} breakdown</p>
                        {detailLoading === itemId && <div style={{fontSize:'0.82rem', color:'var(--text-muted)'}}>Loading...</div>}
                        {detail && detail.error && (
                          <div style={{fontSize:'0.82rem', color:'var(--danger)'}}>{detail.error}</div>
                        )}
                        {Array.isArray(detail) && detail.length === 0 && (
                          <div style={{fontSize:'0.82rem', color:'var(--text-muted)'}}>No detail data.</div>
                        )}
                        {Array.isArray(detail) && detail.length > 0 && (
                          <ul className="ref-list">
                            {detail.slice(0, 8).map((r, ri) => (
                              <li key={ri} style={{position:'relative'}}>
                                <span className="ref-name">{r.name || '(unknown)'}</span>
                                <span className="row-value">{fmtNum(r.count)}</span>
                                <span className="row-bar" style={{ width: ((r.count || 0) / detailMax * 100) + '%' }} />
                              </li>
                            ))}
                          </ul>
                        )}
                      </li>
                    )}
                  </React.Fragment>
                );
              })}
            </ul>
          )}
          {items.length > 8 && (
            <button className="show-more" onClick={() => setShowAll(s => !s)}>
              {showAll ? 'Show less' : `Show all (${items.length})`}
            </button>
          )}
        </div>
      );
    }

    // ============================================================
    // DONUT CHART (browsers / OS / devices)
    // ============================================================
    // Display labels for /stats/sizes: GoatCounter puts the category in `id`
    // ("phone", "desktop", etc.) and leaves `name` empty. /stats/browsers and
    // /stats/systems put the label in `name` directly, so non-device cards
    // don't go through this lookup.
    const DEVICE_LABELS = {
      phone: 'Phones',
      tablet: 'Tablets',
      desktop: 'Laptop/Desktop',
      desktophd: 'HD Display',
      unknown: 'Unknown',
    };

    function DonutCard({ title, stats, deviceMode, client, dateRange, demoMode, page, demoDetails }) {
      const [expanded, setExpanded] = useState(null);
      const [detailData, setDetailData] = useState({});
      const [detailLoading, setDetailLoading] = useState(null);

      useEffect(() => {
        setExpanded(null);
        setDetailData({});
      }, [dateRange]);

      let data = (stats || [])
        .map((x) => {
          const label = deviceMode
            ? (DEVICE_LABELS[x.id]
                || (x.name && x.name.trim())
                || (x.id ? x.id.charAt(0).toUpperCase() + x.id.slice(1) : 'Unknown'))
            : (x.name || 'Unknown');
          return { name: label, value: x.count || 0, apiId: x.id || x.name || '' };
        })
        .filter(x => x.value > 0)
        .sort((a, b) => b.value - a.value);

      if (deviceMode) {
        const merged = {};
        for (const d of data) {
          if (!merged[d.name]) merged[d.name] = { value: 0, apiId: d.apiId };
          merged[d.name].value += d.value;
        }
        data = Object.entries(merged)
          .map(([name, { value, apiId }]) => ({ name, value, apiId }))
          .sort((a, b) => b.value - a.value);
      }

      let chartData = data;
      if (data.length > 6) {
        const top = data.slice(0, 5);
        const rest = data.slice(5).reduce((s, x) => s + x.value, 0);
        chartData = [...top, { name: 'Other', value: rest, apiId: '__other__' }];
      }

      const total = chartData.reduce((s, x) => s + x.value, 0);
      const canDrill = !!((client || demoMode) && page);
      const activeIdx = expanded !== null ? chartData.findIndex(d => d.apiId === expanded) : -1;

      const handleDrilldown = useCallback(async (item) => {
        if (item.apiId === '__other__') return;
        if (expanded === item.apiId) { setExpanded(null); return; }
        setExpanded(item.apiId);
        if (detailData[item.apiId]) return;
        if (demoMode) {
          const details = (demoDetails && demoDetails[item.apiId]) || [];
          setDetailData(prev => ({ ...prev, [item.apiId]: details }));
          return;
        }
        setDetailLoading(item.apiId);
        try {
          const url = `/api/v0/stats/${page}/${encodeURIComponent(item.apiId)}?start=${encodeURIComponent(dateRange.start)}&end=${encodeURIComponent(dateRange.end)}&limit=10`;
          const res = await client.request(url);
          setDetailData(prev => ({ ...prev, [item.apiId]: res.stats || [] }));
        } catch (e) {
          setDetailData(prev => ({ ...prev, [item.apiId]: { error: e.message } }));
        } finally {
          setDetailLoading(null);
        }
      }, [expanded, detailData, client, dateRange, demoMode, demoDetails, page]);

      const activeShape = useCallback((props) => (
        <Sector
          {...props}
          outerRadius={props.outerRadius + 6}
          stroke="var(--accent-hover)"
          strokeWidth={2}
        />
      ), []);

      const expandedItem = expanded !== null ? chartData.find(d => d.apiId === expanded) : null;
      const detailMax = expandedItem && Array.isArray(detailData[expanded])
        ? Math.max(1, ...detailData[expanded].map(x => x.count || 0))
        : 1;

      return (
        <div className="card fade-in">
          <div className="card-header">
            <h3 className="card-title">{title}</h3>
          </div>
          {!chartData.length || total === 0 ? (
            <div className="empty-state">No data.</div>
          ) : (
            <>
              <div className="chart-wrap-sm" style={{position:'relative'}}>
                <ResponsiveContainer width="100%" height="100%">
                  <PieChart>
                    <Tooltip
                      contentStyle={{
                        background: 'var(--bg-surface)',
                        border: '1px solid var(--border)',
                        borderRadius: '8px',
                        fontSize: '0.82rem',
                      }}
                      formatter={(value, name) => [
                        `${fmtNum(value)} (${((value / total) * 100).toFixed(1)}%)`,
                        name,
                      ]}
                    />
                    <Pie
                      data={chartData}
                      cx="50%"
                      cy="50%"
                      innerRadius={55}
                      outerRadius={80}
                      paddingAngle={2}
                      dataKey="value"
                      animationDuration={800}
                      stroke="var(--bg-surface)"
                      strokeWidth={2}
                      activeIndex={activeIdx >= 0 ? activeIdx : undefined}
                      activeShape={canDrill ? activeShape : undefined}
                      onClick={canDrill ? (_, idx) => handleDrilldown(chartData[idx]) : undefined}
                      style={canDrill ? { cursor: 'pointer' } : undefined}
                    >
                      {chartData.map((entry, idx) => (
                        <Cell key={idx} fill={CHART_COLORS[idx % CHART_COLORS.length]} />
                      ))}
                    </Pie>
                  </PieChart>
                </ResponsiveContainer>
                <div style={{
                  position:'absolute', top:'50%', left:'50%',
                  transform:'translate(-50%, -50%)',
                  textAlign:'center', pointerEvents:'none',
                }}>
                  <div style={{
                    fontFamily:"'JetBrains Mono', monospace",
                    fontWeight:700, fontSize:'1.4rem', color:'var(--text)',
                    lineHeight:1.1,
                  }}>{fmtNum(total)}</div>
                  <div style={{
                    fontSize:'0.7rem', color:'var(--text-secondary)',
                    letterSpacing:'0.06em', marginTop:2,
                  }}>TOTAL</div>
                </div>
              </div>
              <div className="legend-row">
                {chartData.map((d, idx) => {
                  const isOther = d.apiId === '__other__';
                  const isActive = expanded === d.apiId;
                  return (
                    <span
                      key={idx}
                      onClick={canDrill && !isOther ? () => handleDrilldown(d) : undefined}
                      style={canDrill && !isOther ? { cursor: 'pointer' } : undefined}
                      role={canDrill && !isOther ? 'button' : undefined}
                      tabIndex={canDrill && !isOther ? 0 : undefined}
                      onKeyDown={canDrill && !isOther ? (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleDrilldown(d); } } : undefined}
                    >
                      <span className="legend-dot" style={{ background: CHART_COLORS[idx % CHART_COLORS.length] }} />
                      <span className="legend-name" style={isActive ? { fontWeight: 600, color: 'var(--text)' } : undefined}>{d.name}</span>
                      <span className="legend-num">{fmtNum(d.value)}</span>
                      {canDrill && !isOther && <span className={'row-chevron' + (isActive ? ' open' : '')} aria-hidden="true" style={{marginLeft:4}}>▸</span>}
                    </span>
                  );
                })}
              </div>
              {expandedItem && (
                <div className="ref-panel" style={{marginTop: 8}}>
                  <p className="ref-panel-title">{expandedItem.name} breakdown</p>
                  {detailLoading === expanded && <div style={{fontSize:'0.82rem', color:'var(--text-muted)'}}>Loading...</div>}
                  {detailData[expanded] && detailData[expanded].error && (
                    <div style={{fontSize:'0.82rem', color:'var(--danger)'}}>{detailData[expanded].error}</div>
                  )}
                  {Array.isArray(detailData[expanded]) && detailData[expanded].length === 0 && (
                    <div style={{fontSize:'0.82rem', color:'var(--text-muted)'}}>No detail data.</div>
                  )}
                  {Array.isArray(detailData[expanded]) && detailData[expanded].length > 0 && (
                    <ul className="ref-list">
                      {detailData[expanded].slice(0, 8).map((r, i) => (
                        <li key={i} style={{position:'relative'}}>
                          <span className="ref-name">{r.name || '(unknown)'}</span>
                          <span className="row-value">{fmtNum(r.count)}</span>
                          <span className="row-bar" style={{ width: ((r.count || 0) / detailMax * 100) + '%' }} />
                        </li>
                      ))}
                    </ul>
                  )}
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ============================================================
    // WORLD MAP — choropleth, lazy-attached to the Countries card.
    // Path data ships separately at assets/world-map.js to keep Babel out
    // of its parse path. Color scale is sqrt so the bottom 80% of countries
    // stay distinguishable. Single delegated mouse handler on the SVG root
    // (not per-path) so 174 countries don't each carry a listener.
    // ============================================================
    const WorldMap = React.memo(function WorldMap({ data, total, highlightCountry }) {
      const [tooltip, setTooltip] = useState(null);
      const wrapRef = useRef(null);

      // Resolve country names to ISO codes; collect any unmapped names
      // for diagnostics (logged once, only when ?debug=1 is in the URL).
      const byCode = useMemo(() => {
        const out = new Map();
        const unmapped = [];
        for (const row of (data || [])) {
          if (!row || !row.count) continue;
          const code = countryNameToCode(row.name);
          if (!code) { unmapped.push(row.name); continue; }
          // If the same ISO appears twice (shouldn't normally), sum counts.
          const prev = out.get(code);
          out.set(code, prev
            ? { name: prev.name, count: prev.count + row.count }
            : { name: row.name, count: row.count });
        }
        if (unmapped.length) {
          try {
            const debug = new URLSearchParams(window.location.search).get('debug') === '1';
            if (debug) console.warn('[WorldMap] Unmapped country names:', unmapped);
          } catch (e) {}
        }
        return out;
      }, [data]);

      const maxCount = useMemo(() => {
        let m = 0;
        for (const v of byCode.values()) if (v.count > m) m = v.count;
        return m;
      }, [byCode]);

      // Map data is provided by assets/world-map.js. If the script failed
      // to load (offline, blocked), render nothing — country list still works.
      const paths = typeof window !== 'undefined' ? window.WORLD_MAP_PATHS : null;
      const viewBox = (typeof window !== 'undefined' && window.WORLD_MAP_VIEWBOX) || '0 0 1000 500';

      // Memoize SVG path nodes so hover state changes don't recreate them.
      // Reconciliation still walks them, but each node is reference-equal
      // and the DOM stays untouched.
      const highlightCode = highlightCountry ? (countryNameToCode(highlightCountry) || highlightCountry) : null;

      const renderedPaths = useMemo(() => {
        if (!paths) return null;
        const out = [];
        for (const code in paths) {
          const entry = byCode.get(code);
          const has = !!entry;
          let opacity = 1;
          if (has && maxCount > 0) {
            const norm = Math.sqrt(entry.count) / Math.sqrt(maxCount);
            opacity = 0.25 + norm * 0.75;
          }
          out.push(
            <path
              key={code}
              d={paths[code]}
              data-code={code}
              data-has={has ? '1' : '0'}
              className={code === highlightCode ? 'map-selected' : undefined}
              fillOpacity={has ? opacity : 1}
            />
          );
        }
        return out;
      }, [paths, byCode, maxCount, highlightCode]);

      // Single delegated handler on the SVG root. Reads data-code from
      // event.target (which is the path under the cursor).
      const handlePoint = useCallback((e) => {
        const target = e.target.closest && e.target.closest('path');
        if (!target || target.dataset.has !== '1') {
          setTooltip(t => t ? null : t);
          return;
        }
        const entry = byCode.get(target.dataset.code);
        if (!entry) return;
        const wrapRect = wrapRef.current && wrapRef.current.getBoundingClientRect();
        if (!wrapRect) return;
        const point = e.touches && e.touches[0] ? e.touches[0] : e;
        setTooltip({
          x: point.clientX - wrapRect.left,
          y: point.clientY - wrapRect.top,
          name: entry.name,
          count: entry.count,
          pct: total > 0 ? ((entry.count / total) * 100).toFixed(1) : '0.0',
        });
      }, [byCode, total]);

      const handleLeave = useCallback(() => setTooltip(null), []);

      // Mobile UX: tap-elsewhere or scroll dismisses the tooltip.
      useEffect(() => {
        if (!tooltip) return;
        const dismiss = () => setTooltip(null);
        window.addEventListener('scroll', dismiss, { passive: true });
        return () => window.removeEventListener('scroll', dismiss);
      }, [tooltip]);

      if (!paths) return null;

      // Position the tooltip with a small offset and clamp it inside the wrap
      // so it doesn't overflow the right edge.
      let ttLeft = 0, ttTop = 0;
      if (tooltip) {
        const wrapW = (wrapRef.current && wrapRef.current.clientWidth) || 1000;
        ttLeft = Math.max(4, Math.min(tooltip.x + 12, wrapW - 200));
        ttTop = Math.max(4, tooltip.y - 50);
      }

      return (
        <div className="world-map-wrap" ref={wrapRef}>
          <svg
            className="world-map"
            viewBox={viewBox}
            preserveAspectRatio="xMidYMid meet"
            role="img"
            aria-label="World map of visitor countries"
            onMouseMove={handlePoint}
            onMouseLeave={handleLeave}
            onTouchStart={handlePoint}
            onTouchMove={handlePoint}
          >
            {renderedPaths}
          </svg>
          {tooltip && (
            <div className="map-tooltip" style={{ left: ttLeft, top: ttTop }}>
              <div className="tt-name">{flagFor(tooltip.name)} {tooltip.name}</div>
              <div className="tt-stats">{fmtNum(tooltip.count)} · {tooltip.pct}%</div>
            </div>
          )}
          <div className="map-legend" aria-hidden="true">
            <span>Less</span>
            <span className="map-legend-bar" />
            <span>More</span>
          </div>
        </div>
      );
    });

    // ============================================================
    // DASHBOARD
    // ============================================================
    function Dashboard({ config, onDisconnect, theme, toggleTheme, demoMode = false }) {
      const [preset, setPreset] = useState('7d');
      const [customStart, setCustomStart] = useState('');
      const [customEnd, setCustomEnd] = useState('');
      const [data, setData] = useState({});
      const [errors, setErrors] = useState({}); // per-key error map
      const [prevTotal, setPrevTotal] = useState(null);
      const [authErr, setAuthErr] = useState(null); // only fatal: bad auth
      const [menuOpen, setMenuOpen] = useState(false);
      const [refreshTick, setRefreshTick] = useState(0);
      const [lastUpdatedAt, setLastUpdatedAt] = useState(null);
      const [progress, setProgress] = useState({ fired: 0, done: 0 });
      const [, setNowTick] = useState(0); // forces re-render so "Updated Xs ago" ticks

      const client = useMemo(() => new APIClient(config.baseURL, config.apiKey), [config]);
      const dateRange = useMemo(() => getDateRange(preset, customStart, customEnd), [preset, customStart, customEnd]);
      const { start, end, days } = dateRange;
      const group = useMemo(() => pickGroup(days), [days]);
      const q = useCallback((path) =>
        path + (path.includes('?') ? '&' : '?') +
        `start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`,
        [start, end]
      );

      // Single source of truth for the URL of each data key. Used by tiers and
      // by per-card retry so they can't drift out of sync.
      const endpointFor = useCallback((key) => {
        switch (key) {
          case 'total':     return q('/api/v0/stats/total');
          case 'hits':      return q(`/api/v0/stats/hits?limit=20&group=${group}`);
          case 'browsers':  return q('/api/v0/stats/browsers');
          case 'systems':   return q('/api/v0/stats/systems');
          case 'sizes':     return q('/api/v0/stats/sizes');
          case 'locations': return q('/api/v0/stats/locations');
          case 'languages': return q('/api/v0/stats/languages');
          case 'campaigns': return q('/api/v0/stats/campaigns');
          default: return null;
        }
      }, [q, group]);

      // Reset state when range or refresh changes — cache makes re-fetch fast on repeats.
      useEffect(() => {
        setData({});
        setErrors({});
        setPrevTotal(null);
        setProgress({ fired: 0, done: 0 });
      }, [start, end, refreshTick]);

      // Generic tier runner. Each entry is a key. Errors and data are tracked
      // per key so a single failure never bricks the dashboard. Progress
      // counters drive the topbar "Loading X of Y…" indicator.
      const runTier = useCallback(async (keys, cancelledRef) => {
        for (const k of keys) {
          if (cancelledRef.current) return;
          const url = endpointFor(k);
          if (!url) continue;
          setProgress(p => ({ ...p, fired: p.fired + 1 }));
          let earlyReturn = false;
          try {
            const res = await client.request(url);
            if (cancelledRef.current) { earlyReturn = true; return; }
            setData(prev => ({ ...prev, [k]: res }));
            setErrors(prev => { if (!(k in prev)) return prev; const n = { ...prev }; delete n[k]; return n; });
          } catch (e) {
            if (cancelledRef.current) { earlyReturn = true; return; }
            if (e.kind === 'auth') { setAuthErr(e); earlyReturn = true; return; }
            // campaigns is optional — older self-hosted instances may 404
            if (k === 'campaigns' && e.kind === 'notfound') {
              setData(prev => ({ ...prev, campaigns: { stats: [] } }));
              continue;
            }
            setErrors(prev => ({ ...prev, [k]: e.message || 'Failed' }));
          } finally {
            // Always pair fired++ with done++ so the progress counter never
            // gets stuck. React 18 silently no-ops setState on unmounted
            // components, so we don't need to guard for that.
            setProgress(p => ({ ...p, done: p.done + 1 }));
          }
          if (earlyReturn) return;
        }
      }, [client, endpointFor]);

      // Single-key retry — fires one request through the queue with cache bypass.
      // By the time the user notices a failed card and clicks retry, the bucket
      // has refilled, and a single isolated request is very likely to succeed.
      // Dedupe on rapid clicks so the same retry doesn't queue twice.
      const inFlightRetries = useRef(new Set());
      const retryKey = useCallback(async (key) => {
        if (inFlightRetries.current.has(key)) return;
        const url = endpointFor(key);
        if (!url) return;
        inFlightRetries.current.add(key);
        setErrors(prev => { if (!(key in prev)) return prev; const n = {...prev}; delete n[key]; return n; });
        setProgress(p => ({ ...p, fired: p.fired + 1 }));
        try {
          const res = await client.request(url, { forceRefresh: true });
          setData(prev => ({ ...prev, [key]: res }));
        } catch (e) {
          if (e.kind === 'auth') { setAuthErr(e); return; }
          setErrors(prev => ({ ...prev, [key]: e.message || 'Failed' }));
        } finally {
          setProgress(p => ({ ...p, done: p.done + 1 }));
          inFlightRetries.current.delete(key);
        }
      }, [client, endpointFor]);

      // Demo mode: load static fixtures directly, skip the entire fetch
      // pipeline. Effect fires when range/refreshTick change. All four real
      // tier effects below early-return when demoMode is on.
      useEffect(() => {
        if (!demoMode) return;
        const demo = buildDemoData(preset);
        setData(demo.data);
        setPrevTotal(demo.prevTotal);
        setErrors({});
        setProgress({ fired: 0, done: 0 });
        setLastUpdatedAt(Date.now());
      }, [demoMode, preset, customStart, customEnd, refreshTick]);

      // Network warm-up: prime DNS, TCP, TLS, and CORS preflight before
      // real data requests. On mobile (especially iOS Safari), the first
      // fetch after a long tab suspension often fails because the network
      // stack isn't ready. This throwaway request absorbs that penalty.
      // Runs once per session; the bfcache handler resets the flag so a
      // restore triggers a fresh warm-up.
      const warmUpDone = useRef(false);
      const warmUp = useCallback(async () => {
        if (warmUpDone.current) return;
        warmUpDone.current = true;
        for (let i = 0; i < 3; i++) {
          try {
            await fetch(config.baseURL + '/api/v0/me', {
              headers: { 'Authorization': 'Bearer ' + config.apiKey },
            });
            return;
          } catch (e) {
            if (i < 2) await new Promise(r => setTimeout(r, 300 * (i + 1)));
          }
        }
      }, [config.baseURL, config.apiKey]);

      // Tier 1 — always fires. KPIs, traffic chart, top pages, and languages.
      // Plus the previous-period total for the trend KPI.
      // Languages is in Tier 1 (not lazy) because it sits next to Top Pages
      // in the same row — an asymmetric skeleton would look broken. The
      // extra ~500ms (one queue slot) is invisible after the first load
      // since the cache absorbs it.
      useEffect(() => {
        if (demoMode) return;
        const cancelledRef = { current: false };
        (async () => {
          await warmUp();
          if (cancelledRef.current) return;
          await runTier(['total', 'hits', 'languages'], cancelledRef);
          if (cancelledRef.current) return;
          setLastUpdatedAt(Date.now());

          // Previous-period total for trend (best-effort, doesn't block UI)
          setProgress(p => ({ ...p, fired: p.fired + 1 }));
          try {
            const prev = getPreviousRange(start, end);
            const prevRes = await client.request(
              `/api/v0/stats/total?start=${encodeURIComponent(prev.start)}&end=${encodeURIComponent(prev.end)}`
            );
            if (!cancelledRef.current) setPrevTotal(prevRes.total ?? prevRes.total_utc ?? null);
          } catch (e) {
            if (!cancelledRef.current) setPrevTotal(null);
          } finally {
            // Always increment done — see runTier finally for the rationale.
            setProgress(p => ({ ...p, done: p.done + 1 }));
          }
        })();
        return () => { cancelledRef.current = true; };
      }, [demoMode, client, start, end, refreshTick, runTier, warmUp]);

      // Tier 2 — donut row (browsers / OS / devices). Lazy on visibility.
      const [donutRowRef, donutInView] = useInView();
      useEffect(() => {
        if (demoMode || !donutInView) return;
        const cancelledRef = { current: false };
        runTier(['browsers', 'systems', 'sizes'], cancelledRef);
        return () => { cancelledRef.current = true; };
      }, [demoMode, donutInView, refreshTick, runTier]);

      // Tier 3 — Countries (with map). Lazy on visibility. Languages used
      // to live here too but moved to Tier 1 when the layout paired it with
      // Top Pages.
      const [geoRowRef, geoInView] = useInView();
      useEffect(() => {
        if (demoMode || !geoInView) return;
        const cancelledRef = { current: false };
        runTier(['locations'], cancelledRef);
        return () => { cancelledRef.current = true; };
      }, [demoMode, geoInView, refreshTick, runTier]);

      // Tier 4 — campaigns. Lazy on visibility.
      const [campaignsRef, campaignsInView] = useInView();
      useEffect(() => {
        if (demoMode || !campaignsInView) return;
        const cancelledRef = { current: false };
        runTier(['campaigns'], cancelledRef);
        return () => { cancelledRef.current = true; };
      }, [demoMode, campaignsInView, refreshTick, runTier]);

      // bfcache restore: browser preserved the JS heap across a back/forward
      // navigation or long tab suspension. React state is stale — force a full
      // re-fetch by bumping refreshTick so every tier effect re-fires.
      useEffect(() => {
        const onPageShow = (e) => { if (e.persisted) { warmUpDone.current = false; setRefreshTick(t => t + 1); } };
        window.addEventListener('pageshow', onPageShow);
        return () => window.removeEventListener('pageshow', onPageShow);
      }, []);

      // Tick every 10s so the "Updated Xs ago" label stays current.
      useEffect(() => {
        if (!lastUpdatedAt) return;
        const id = setInterval(() => setNowTick(t => t + 1), 10_000);
        return () => clearInterval(id);
      }, [lastUpdatedAt]);

      // Auth error: bounce to connect screen
      useEffect(() => {
        if (authErr) {
          onDisconnect(authErr.message || 'Authentication failed.');
        }
      }, [authErr, onDisconnect]);

      const hasAnyError = Object.keys(errors).length > 0;
      const failedKeys = Object.keys(errors);

      // Click-outside to close menu
      const menuRef = useRef(null);
      useEffect(() => {
        if (!menuOpen) return;
        const onDown = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false); };
        document.addEventListener('mousedown', onDown);
        return () => document.removeEventListener('mousedown', onDown);
      }, [menuOpen]);

      const site = config.me?.site;
      const siteName = site?.cname
        || (site?.code ? `${site.code}.goatcounter.com` : new URL(config.baseURL).host);

      // Build time-series for traffic chart from hits "max"-grouped buckets.
      // GoatCounter's hits payload returns per-path series keyed by group:
      //   stats: [{ day: 'YYYY-MM-DD', daily: N, hourly: [..] }]
      // Aggregate across paths for the overall traffic line.
      const trafficSeries = useMemo(() => {
        if (!data || !data.hits || !Array.isArray(data.hits.hits)) return [];
        const buckets = new Map();

        for (const path of data.hits.hits) {
          const stats = path.stats || [];
          for (const s of stats) {
            if (group === 'hour' && Array.isArray(s.hourly)) {
              s.hourly.forEach((cnt, hour) => {
                const ts = `${s.day}T${String(hour).padStart(2, '0')}:00:00Z`;
                buckets.set(ts, (buckets.get(ts) || 0) + (cnt || 0));
              });
            } else {
              const ts = `${s.day}T00:00:00Z`;
              buckets.set(ts, (buckets.get(ts) || 0) + (s.daily || 0));
            }
          }
        }

        return Array.from(buckets.entries())
          .sort(([a], [b]) => a.localeCompare(b))
          .map(([ts, count]) => ({ ts, count }));
      }, [data, group]);

      const totalNum = data?.total?.total ?? data?.total?.total_utc ?? 0;
      const trend = useMemo(() => {
        if (!Number.isFinite(totalNum) || prevTotal === null || prevTotal === 0) {
          if (prevTotal === 0 && totalNum > 0) return 100;
          return null;
        }
        return ((totalNum - prevTotal) / prevTotal) * 100;
      }, [totalNum, prevTotal]);

      const pageviewSum = useMemo(
        () => trafficSeries.reduce((s, p) => s + p.count, 0),
        [trafficSeries]
      );

      const topPagePath = useMemo(() => {
        if (!data?.hits?.hits?.length) return { name: '—', count: 0 };
        const top = data.hits.hits.slice().sort((a, b) => b.count - a.count)[0];
        return { name: top.path, count: top.count };
      }, [data]);

      const presetLabel = (p) => p === '7d' ? 'last 7 days' : p === '30d' ? 'last 30 days' : p === '90d' ? 'last 90 days' : p === 'today' ? 'today' : 'selected range';

      return (
        <>
          {demoMode && (
            <div className="demo-banner" role="status">
              <span>📊 Viewing demo data · Connect your GoatCounter to see real analytics</span>
              <button
                onClick={onDisconnect}
                className="demo-banner-link"
                title="Exit demo and return to the connect screen"
              >Connect →</button>
            </div>
          )}
        <div className="container">
          {/* Top bar */}
          <header className="topbar">
            <div className="topbar-brand">
              <span className="topbar-logo" aria-hidden="true">🐐</span>
              <div className="topbar-titles">
                <h1 className="topbar-title">GoatCounter Dashboard</h1>
                <p className="topbar-site truncate">{siteName}</p>
              </div>
            </div>

            <div className="topbar-actions">
              <div className="seg" role="tablist" aria-label="Date range">
                {[
                  ['today','Today'],
                  ['7d','7d'],
                  ['30d','30d'],
                  ['90d','90d'],
                  ['custom','Custom'],
                ].map(([val,label]) => (
                  <button
                    key={val}
                    className={preset === val ? 'active' : ''}
                    onClick={() => setPreset(val)}
                    role="tab"
                    aria-selected={preset === val}
                  >{label}</button>
                ))}
              </div>

              {preset === 'custom' && (
                <div className="custom-range">
                  <input
                    type="date"
                    value={customStart}
                    onChange={(e) => setCustomStart(e.target.value)}
                    aria-label="Start date"
                    max={customEnd || undefined}
                  />
                  <span className="sep">→</span>
                  <input
                    type="date"
                    value={customEnd}
                    onChange={(e) => setCustomEnd(e.target.value)}
                    aria-label="End date"
                    min={customStart || undefined}
                  />
                </div>
              )}

              <button
                className="btn-icon"
                onClick={toggleTheme}
                title={theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'}
                aria-label="Toggle theme"
              >
                {theme === 'dark' ? '☀' : '🌙'}
              </button>

              {demoMode ? (
                <span className="freshness" title="Static demo dataset — no live API">Demo data</span>
              ) : progress.fired > progress.done ? (
                <span className="freshness loading" title="Fetching from GoatCounter…">
                  Loading {progress.done + 1} of {progress.fired}…
                </span>
              ) : lastUpdatedAt ? (
                <span
                  className="freshness"
                  title={new Date(lastUpdatedAt).toLocaleString()}
                >Updated {relativeTime(lastUpdatedAt)}</span>
              ) : null}

              <div className="menu-wrap" ref={menuRef}>
                <button
                  className="btn-icon"
                  onClick={() => setMenuOpen(o => !o)}
                  aria-haspopup="true"
                  aria-expanded={menuOpen}
                  aria-label="Settings"
                >⚙</button>
                {menuOpen && (
                  <div className="menu" role="menu">
                    {!demoMode && (
                      <>
                        <button onClick={() => {
                          setMenuOpen(false);
                          APIClient.clearCache(config.baseURL);
                          setRefreshTick(t => t + 1);
                        }}>↻ Refresh data</button>
                        <hr />
                      </>
                    )}
                    <button className="danger" onClick={() => {
                      setMenuOpen(false);
                      if (!demoMode && config.baseURL) APIClient.clearCache(config.baseURL);
                      onDisconnect();
                    }}>{demoMode ? 'Exit demo' : 'Disconnect'}</button>
                  </div>
                )}
              </div>
            </div>
          </header>

          {hasAnyError && (
            <div className="error-banner" role="alert" style={{marginBottom:16}}>
              Some sections couldn't load: <strong>{failedKeys.join(', ')}</strong>. Retry each card individually below — single requests usually succeed once the rate limit refills.
            </div>
          )}

          {/* Per-key state helpers — render real card when ready, error card when failed,
              skeleton otherwise. Keeps the dashboard usable when one endpoint fails. */}
          {(() => {
            const ready = (k) => data && (data[k] !== undefined);
            const failed = (k) => errors[k] !== undefined;
            const ErrCard = ({ title, onRetry }) => (
              <div className="card fade-in">
                <div className="card-header"><h3 className="card-title">{title}</h3></div>
                <div className="card-error-row">
                  <span>Failed to load</span>
                  {onRetry && (
                    <button
                      onClick={onRetry}
                      className="retry-btn"
                      title="Retry this card"
                      aria-label={`Retry ${title}`}
                    >↻ Retry</button>
                  )}
                </div>
              </div>
            );

            return (
              <>
                {/* KPI row */}
                <section className="grid grid-kpis" style={{marginBottom: 20}}>
                  {ready('total') || failed('total') ? (
                    <KPICard
                      label="Total visitors"
                      value={failed('total') ? '—' : fmtNum(totalNum)}
                      trend={failed('total') ? null : trend}
                      sub={`vs previous ${presetLabel(preset)}`}
                    />
                  ) : <SkeletonKPI />}
                  {ready('hits') || failed('hits') ? (
                    <KPICard
                      label="Pageviews"
                      value={failed('hits') ? '—' : fmtNum(pageviewSum)}
                      sub={presetLabel(preset)}
                    />
                  ) : <SkeletonKPI />}
                  {ready('hits') || failed('hits') ? (
                    <KPICard
                      label="Top page"
                      value={failed('hits') ? '—' : topPagePath.name}
                      sub={failed('hits') ? '' : `${fmtNum(topPagePath.count)} hits`}
                      isString
                    />
                  ) : <SkeletonKPI />}
                  {ready('hits') || failed('hits') ? (
                    <KPICard
                      label="Tracked paths"
                      value={failed('hits') ? '—' : fmtNum(data?.hits?.hits?.length || 0)}
                      sub="distinct URLs in range"
                    />
                  ) : <SkeletonKPI />}
                </section>

                {/* Traffic chart */}
                <section style={{marginBottom: 20}}>
                  {failed('hits') ? <ErrCard title="Visitors over time" onRetry={() => retryKey('hits')} />
                    : ready('hits') ? <TrafficChart series={trafficSeries} group={group} />
                    : <SkeletonCard h={280} />}
                </section>

                {/* Top pages + Languages — paired list cards. 70/30 split.
                    Both load in Tier 1 so they appear together; an asymmetric
                    skeleton (one rendered, one shimming) would look broken.
                    Aggregate referrers aren't returned by GoatCounter at the
                    dashboard level — click any row in Top Pages to drill in. */}
                <section className="grid grid-7-3" style={{marginBottom: 20}}>
                  {failed('hits') ? <ErrCard title="Top pages" onRetry={() => retryKey('hits')} />
                    : ready('hits') ? (
                      <TopPagesCard
                        paths={data?.hits?.hits || []}
                        total={totalNum}
                        client={client}
                        dateRange={dateRange}
                        demoMode={demoMode}
                        demoRefs={demoMode ? DEMO_REFS : null}
                      />
                    ) : <SkeletonCard />}
                  {failed('languages') ? <ErrCard title="Languages" onRetry={() => retryKey('languages')} />
                    : ready('languages') ? <TopListCard title="Languages" stats={data?.languages?.stats} />
                    : <SkeletonCard />}
                </section>

                {/* Donuts: browsers / OS / devices — lazy on visibility (Tier 2) */}
                <section ref={donutRowRef} className="grid grid-3" style={{marginBottom: 20}}>
                  {failed('browsers') ? <ErrCard title="Browsers" onRetry={() => retryKey('browsers')} />
                    : ready('browsers') ? <DonutCard title="Browsers" stats={data?.browsers?.stats} client={client} dateRange={dateRange} demoMode={demoMode} page="browsers" demoDetails={DEMO_BROWSER_DETAILS} />
                    : <SkeletonCard />}
                  {failed('systems') ? <ErrCard title="Operating systems" onRetry={() => retryKey('systems')} />
                    : ready('systems') ? <DonutCard title="Operating systems" stats={data?.systems?.stats} client={client} dateRange={dateRange} demoMode={demoMode} page="systems" demoDetails={DEMO_SYSTEM_DETAILS} />
                    : <SkeletonCard />}
                  {failed('sizes') ? <ErrCard title="Devices" onRetry={() => retryKey('sizes')} />
                    : ready('sizes') ? <DonutCard title="Devices" stats={data?.sizes?.stats} deviceMode client={client} dateRange={dateRange} demoMode={demoMode} page="sizes" demoDetails={DEMO_SIZE_DETAILS} />
                    : <SkeletonCard />}
                </section>

                {/* Countries with embedded world map — full width, lazy on
                    visibility (Tier 3). The map is the heaviest visual on the
                    page and benefits from the full width; users who only want
                    quick stats never need to scroll past it. */}
                <section ref={geoRowRef} style={{marginBottom: 20}}>
                  {failed('locations') ? <ErrCard title="Countries" onRetry={() => retryKey('locations')} />
                    : ready('locations') ? (
                      <TopListCard
                        title="Countries"
                        stats={data?.locations?.stats}
                        prefix={(x) => <span style={{marginRight:8, fontSize:'1rem'}}>{flagFor(x.name)}</span>}
                        topSlot={<WorldMap data={data?.locations?.stats} total={totalNum} />}
                        client={client}
                        dateRange={dateRange}
                        demoMode={demoMode}
                        page="locations"
                        demoDetails={DEMO_LOCATION_DETAILS}
                      />
                    ) : <SkeletonCard />}
                </section>

                {/* Campaigns — lazy on visibility (Tier 4). Only renders the card if data has rows. */}
                <section ref={campaignsRef} style={{marginBottom: 20}}>
                  {ready('campaigns') && data?.campaigns?.stats?.length > 0 && (
                    <div className="grid">
                      <TopListCard
                        title="Campaigns"
                        subtitle="Campaign parameters seen in traffic"
                        stats={data.campaigns.stats}
                        client={client}
                        dateRange={dateRange}
                        demoMode={demoMode}
                        page="campaigns"
                        demoDetails={DEMO_CAMPAIGN_DETAILS}
                      />
                    </div>
                  )}
                </section>
              </>
            );
          })()}

          <footer className="footer">
            Built with <span className="heart">♥</span> by{' '}
            <a href="https://abhishekhsingh.github.io" target="_blank" rel="noopener noreferrer">Abhishekh Singh</a>
            {' · '}
            <a href="https://github.com/abhishekhsingh/goatcounter-dashboard" target="_blank" rel="noopener noreferrer">GitHub</a>
            {' · '}
            Powered by <a href="https://goatcounter.com" target="_blank" rel="noopener noreferrer">GoatCounter</a> API
          </footer>
        </div>
        </>
      );
    }

    // ============================================================
    // ROOT
    // ============================================================
    function App() {
      const [theme, toggleTheme] = useTheme();
      const [config, setConfig] = useState(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch (e) {}
        return null;
      });
      const [authError, setAuthError] = useState('');
      const [demoMode, setDemoMode] = useState(false);

      const handleConnect = useCallback(({ baseURL, apiKey, me }) => {
        const cfg = { baseURL, apiKey, me };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg)); } catch (e) {}
        setConfig(cfg);
        setDemoMode(false);
        setAuthError('');
      }, []);

      const handleDisconnect = useCallback((msg) => {
        try {
          if (config?.baseURL) APIClient.clearCache(config.baseURL);
          localStorage.removeItem(STORAGE_KEY);
        } catch (e) {}
        setConfig(null);
        if (msg) setAuthError(msg);
        else setAuthError('');
      }, [config?.baseURL]);

      // Demo mode: skip the connect form entirely and feed Dashboard a stub
      // config. APIClient is created but never called (every fetch effect
      // early-returns on demoMode). Exiting demo just clears the flag.
      const handleTryDemo = useCallback(() => {
        setDemoMode(true);
        setAuthError('');
      }, []);
      const handleExitDemo = useCallback(() => {
        setDemoMode(false);
      }, []);

      if (!config && !demoMode) {
        return (
          <ConnectScreen
            onConnect={handleConnect}
            onTryDemo={handleTryDemo}
            initialError={authError}
          />
        );
      }

      const effectiveConfig = config || {
        baseURL: '_demo_',
        apiKey: '_demo_',
        me: { site: { cname: 'Demo site', code: 'demo' } },
      };

      return (
        <Dashboard
          config={effectiveConfig}
          onDisconnect={demoMode ? handleExitDemo : handleDisconnect}
          theme={theme}
          toggleTheme={toggleTheme}
          demoMode={demoMode}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
