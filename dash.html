<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard</title>

<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
h1{text-align:center;margin-bottom:20px}

.metrics{display:flex;gap:15px;margin-bottom:25px}
.metric{flex:1;background:#fff;padding:15px;border-radius:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,.1)}
.metric-value{font-size:26px;font-weight:bold}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden}
th{background:#1976d2;color:#fff;padding:10px}
td{padding:10px;border-bottom:1px solid #eee}

.status{margin-top:10px;color:#666}
button{padding:8px 12px;background:#1976d2;color:#fff;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#1565c0}
</style>
</head>

<body>

<h1>Analytics Dashboard</h1>

<div class="metrics">
  <div class="metric">PV<div class="metric-value" id="pv">0</div></div>
  <div class="metric">UV<div class="metric-value" id="uv">0</div></div>
  <div class="metric">Avg<div class="metric-value" id="avgDuration">0s</div></div>
  <div class="metric">Today<div class="metric-value" id="todayPV">0</div></div>
</div>

<button onclick="fetchStats()">Refresh</button>

<h2>Visitor Details</h2>

<table>
<thead>
<tr>
  <th>Page</th>
  <th>IP</th>
  <th>Region</th>
  <th>Visits</th>
  <th>Duration(s)</th>
  <th>Last Visit</th>
</tr>
</thead>

<tbody id="pageStats">
<tr><td colspan="6">Loading...</td></tr>
</tbody>
</table>

<div class="status" id="status">Loading...</div>

<script>

const API = "https://view.zyq1569.workers.dev/stats";

// 🌍 GeoIP 本地表
let geoMap = {};

// 1️⃣ 載入 GeoIP JSON
async function loadGeo() {
    try {
        const res = await fetch("https://raw.githubusercontent.com/sapics/ip-location-db/master/geo-whois-asn-country/geo-whois-asn-country.json");
        geoMap = await res.json();
        console.log("Geo loaded:", Object.keys(geoMap).length);
    } catch (e) {
        console.warn("Geo load failed", e);
    }
}

// 2️⃣ 查地區
function getRegion(ip, cfCountry, cfCity) {

    if (cfCountry || cfCity) {
        return (cfCountry || "") + (cfCity ? " / " + cfCity : "");
    }

    const geo = geoMap[ip];
    if (geo) {
        return geo.country || "Unknown";
    }

    return ip || "Unknown";
}

// 3️⃣ 拉統計
async function fetchStats() {
    try {

        document.getElementById("status").innerText = "Loading...";

        const res = await fetch(API);
        const data = await res.json();

        // metrics
        document.getElementById("pv").innerText = data.pv || 0;
        document.getElementById("uv").innerText = data.uv || 0;
        document.getElementById("avgDuration").innerText = (data.avgDuration || 0) + "s";
        document.getElementById("todayPV").innerText = data.todayPV || 0;

        // table
        const tbody = document.getElementById("pageStats");
        tbody.innerHTML = "";

        if (!data.pages || data.pages.length === 0) {
            tbody.innerHTML = "<tr><td colspan='6'>No data</td></tr>";
            return;
        }

        data.pages.forEach(p => {

            const region = getRegion(p.ip, p.country, p.city);

            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${p.path}</td>
                <td>${p.ip}</td>
                <td>${region}</td>
                <td>${p.count}</td>
                <td>${p.totalDuration}</td>
                <td>${p.lastVisit}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById("status").innerText =
            "Last update: " + new Date().toLocaleString();

    } catch (e) {
        console.error(e);
        document.getElementById("status").innerText = "Error loading data";
    }
}

// init
(async function(){
    await loadGeo();     // 先載入 Geo 表
    await fetchStats();  // 再載入數據

    // 10 秒刷新
    setInterval(fetchStats, 10000);
})();

</script>

</body>
</html>
