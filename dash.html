<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>📊 Mini Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h1 { text-align: center; }
  #charts { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; }
  canvas { background: #f8f8f8; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
  pre { background: #eee; padding: 10px; border-radius: 5px; overflow-x: auto; }
</style>
</head>
<body>

<h1>📊 Mini Analytics Dashboard</h1>
<div id="charts">
  <canvas id="pvuvChart" width="400" height="200"></canvas>
  <canvas id="countryChart" width="400" height="200"></canvas>
  <canvas id="durationChart" width="400" height="200"></canvas>
</div>

<h2>🔥 熱門頁面</h2>
<pre id="popular"></pre>

<script>
async function fetchData() {
  const res = await fetch("https://view.zyq1569.workers.dev/stats");
  const data = await res.json();
  return data;
}

function computeStats(data) {
  const pv = data.length;
  const uvSet = new Set(data.map(d => d.ip));
  const uv = uvSet.size;

  // 國家分佈
  const countries = {};
  data.forEach(d => { 
    countries[d.country] = (countries[d.country] || 0) + 1;
  });

  // 平均停留時間（秒）
  const durations = data.map(d => d.duration || 0);
  const avgDuration = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0)/durations.length) : 0;

  // 熱門頁面
  const pages = {};
  data.forEach(d => { pages[d.path] = (pages[d.path]||0)+1; });
  const popular = Object.entries(pages).sort((a,b)=>b[1]-a[1]);

  return { pv, uv, countries, avgDuration, popular };
}

function renderCharts(stats) {
  const ctx1 = document.getElementById('pvuvChart').getContext('2d');
  new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: ['PV', 'UV'],
      datasets: [{
        label: '訪問統計',
        data: [stats.pv, stats.uv],
        backgroundColor: ['#4caf50','#2196f3']
      }]
    }
  });

  const ctx2 = document.getElementById('countryChart').getContext('2d');
  new Chart(ctx2, {
    type: 'pie',
    data: {
      labels: Object.keys(stats.countries),
      datasets: [{
        label: '國家分佈',
        data: Object.values(stats.countries),
        backgroundColor: ['#f44336','#ff9800','#9c27b0','#3f51b5','#00bcd4','#8bc34a']
      }]
    }
  });

  const ctx3 = document.getElementById('durationChart').getContext('2d');
  new Chart(ctx3, {
    type: 'line',
    data: {
      labels: stats.popular.map(p=>p[0]),
      datasets: [{
        label: '頁面停留時間 (平均秒)',
        data: stats.popular.map(p=>{
          const filtered = data.filter(d=>d.path===p[0]);
          const avg = filtered.reduce((a,b)=>a+b.duration,0)/filtered.length;
          return Math.round(avg);
        }),
        borderColor: '#ff5722',
        fill: false
      }]
    }
  });

  document.getElementById('popular').innerText = stats.popular.map(p=>`${p[0]}: ${p[1]} 次`).join('\n');
}

let data;

async function init() {
  data = await fetchData();
  const stats = computeStats(data);
  renderCharts(stats);
}

init();
</script>

</body>
</html>
