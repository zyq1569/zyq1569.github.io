<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music from Heaven</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
        }

        .audio-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            padding-top: 50px;
        }

        /* 修改重點：左上角頂點位置 */
        .home-btn {
            position: absolute;
            left: 1px;
            top: 1px;
            padding: 8px 18px;
            background-color: #ff4500;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 18px;
            color: #ccc;
        }

        .audio-row-container {
            margin-bottom: 30px;
            position: relative;
        }

        .audio-row-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .audio-row {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
        }

        .audio-row::-webkit-scrollbar {
            height: 8px;
        }

        .audio-row::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .audio-item {
            flex: 0 0 auto;
            width: 200px;
            background: #222;
            padding: 10px;
            cursor: pointer;
            position: relative;
            border-radius: 5px;
            transition: transform 0.2s;
            scroll-snap-align: start;
        }

        .audio-item:hover {
            transform: scale(1.05);
        }

        .item-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-desc:hover::after {
            content: attr(data-full);
            position: absolute;
            left: 0;
            top: 60px;
            background: #333;
            color: #fff;
            padding: 5px;
            white-space: normal;
            width: 200px;
            z-index: 10;
            border-radius: 5px;
        }

        #detail-page {
            display: none;
        }

        .audio-player {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .audio-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .audio-description {
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 12px;
            background-color: #ff4500;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 播放列表 */
        #playlist {
            background: #1c1c1c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        #playlist h3 {
            margin: 5px 0 10px 0;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            border-bottom: 1px solid #333;
        }

        .playlist-item.active {
            background-color: #ff4500;
        }

        .playlist-item span {
            flex: 1;
            margin-right: 10px;
        }

        .playlist-item button {
            margin-left: 5px;
            padding: 2px 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background: #ff4500;
            color: white;
        }

        /* 固定底部播放控制 */
        #fixed-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1c1c1c;
            padding: 5px 10px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.5);
        }

        #progress-bar {
            width: 100%;
            margin-bottom: 5px;
        }

        #player-controls {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            /* 移除 flex-wrap，讓按鈕保持同一行 */
        }

        #player-controls button,
        #player-controls select,
        #player-controls a {
            flex: 1;
            min-width: 50px;
            padding: 6px 4px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background: #ff4500;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-size: clamp(12px, 2vw, 15px);
        }

        /* 音頻推薦手機適配 */
        @media (max-width: 600px) {
            .audio-item {
                width: 90%;
                min-width: 150px;
            }

            .page-header h1 {
                font-size: 28px;
            }

            .page-header p {
                font-size: 16px;
            }

            .audio-title {
                font-size: 20px;
            }

            .audio-description {
                font-size: 14px;
            }

            /* 手機端進一步壓縮按鈕間距 */
            #player-controls {
                gap: 3px;
            }

            #player-controls button,
            #player-controls select,
            #player-controls a {
                padding: 5px 3px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div id="main-page" class="audio-page">
        <!-- 修改重點：新增主頁按鈕 -->
        <div class="page-header">
            <a href="https://zyq1569.github.io/" class="home-btn">主頁</a>
            <div>
                <h2>推薦天國的音樂</h2>
                <p>天音淨樂:所有音樂來源於[天音網]</p>
            </div>
        </div>

        <div id="playlist">
            <h3>播放列表</h3>
            <div id="playlist-items"></div>
        </div>

        <div id="recommendation-container"></div>
    </div>

    <div id="detail-page" class="audio-page">
        <a class="back-btn" id="back-btn">返回</a>
        <div class="audio-player">
            <audio id="detail-audio" src="" controls controlsList="nodownload"></audio>
        </div>
        <div class="audio-title" id="detail-title"></div>
        <div class="audio-description" id="detail-description"></div>
    </div>

    <div id="fixed-player">
        <input type="range" id="progress-bar" value="0" min="0" max="100" />
        <div id="player-controls">
            <button id="prev-btn">上一首</button>
            <button id="play-btn">播放</button>
            <button id="next-btn">下一首</button>
            <button id="mode-btn">:順序</button>
            <button id="clear-btn">清空</button>
            <label>:
                <select id="speed-select">
                    <option value="0.5">0.5x</option>
                    <option value="0.75">0.75x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.25">1.25x</option>
                    <option value="1.5">1.5x</option>
                    <option value="2">2x</option>
                </select>
            </label>
            <a id="download-btn" href="#" download>下載</a>
        </div>
    </div>

    <script>
        const categories = [
            {
                name: "推薦",
                audios: [
                    { src: "./resource/tianyi.mp3", title: "推薦1:天意", description: "天音淨樂 天意" },
                    { src: "./resource/xiyuan.mp3", title: "推薦2:惜緣", description: "天音淨樂 惜緣" },
                    { src: "./resource/dsg.mp3", title: "推薦3:登山高", description: "天音淨樂 登山高" }
                ]
            },
            {
                name: "大唐",
                audios: [
                    { src: "./resource/mp3/01.mp3", title: "大唐的記憶", description: "天音淨樂 大唐的記憶" },
                    { src: "./resource/mp3/02.mp3", title: "无语凝咽", description: "天音淨樂 无语凝咽" },
                    { src: "./resource/mp3/03.mp3", title: "中国心", description: "天音淨樂 中国心" },
                    { src: "./resource/mp3/04.mp3", title: "夜思", description: "天音淨樂 夜思" },
                    { src: "./resource/mp3/05.mp3", title: "盛世", description: "天音淨樂 盛世" },
                    { src: "./resource/mp3/06.mp3", title: "山河", description: "天音淨樂 山河" },
                    { src: "./resource/mp3/07.mp3", title: "敬悼", description: "天音淨樂 敬悼" },
                    { src: "./resource/mp3/08.mp3", title: "归途", description: "天音淨樂 归途" },
                    { src: "./resource/mp3/09.mp3", title: "古道", description: "天音淨樂 古道" },
                    { src: "./resource/mp3/10.mp3", title: "风动玲动心不动", description: "天音淨樂 风动玲动心不动" },
                    { src: "./resource/mp3/11.mp3", title: "赴", description: "天音淨樂 赴" },
                    { src: "./resource/mp3/12.mp3", title: "世间梦幻", description: "天音淨樂 世间梦幻" },
                    { src: "./resource/mp3/13.mp3", title: "尊容", description: "天音淨樂 尊容" }
                ]
            }
            // {
            //     name: "推薦",
            //     audios: [
            //         { src: "./resource/tianyi.mp3", title: "天音淨樂1", description: "1" },
            //         { src: "./resource/xiyuan.mp3", title: "天音淨樂2", description: "2" },
            //         { src: "./resource/dsg.mp3", title: "天音淨樂3", description: "3" }
            //     ]
            // },
            // {
            //     name: "最新",
            //     audios: Array.from({ length: 13 }, (_, i) => ({
            //         src: `./resource/mp3/${String(i + 1).padStart(2, "0")}.mp3`,
            //         title: `${i + 1}`,
            //         description: `${i + 1}`
            //     }))
            // }
        ];
        const mainPage = document.getElementById("main-page");
        const detailPage = document.getElementById("detail-page");
        const detailAudio = document.getElementById("detail-audio");
        const playlistItemsDiv = document.getElementById("playlist-items");

        const playlistAudio = document.createElement("audio");
        playlistAudio.style.display = "none";
        document.body.appendChild(playlistAudio);

        const playBtn = document.getElementById("play-btn");
        const downloadBtn = document.getElementById("download-btn");
        const progressBar = document.getElementById("progress-bar");
        const speedSelect = document.getElementById("speed-select");

        let playlist = [];
        let currentIndex = 0;
        let playMode = "順序";

        function renderPlaylist() {
            playlistItemsDiv.innerHTML = "";
            playlist.forEach((audio, index) => {
                const div = document.createElement("div");
                div.className = "playlist-item";
                if (index === currentIndex) div.classList.add("active");
                div.innerHTML = `<span>${audio.title}</span>
                    <div>
                        <button data-action="up" data-index="${index}">↑</button>
                        <button data-action="down" data-index="${index}">↓</button>
                        <button data-action="remove" data-index="${index}">移除</button>
                    </div>`;
                div.addEventListener("click", () => playSelected(index));
                div.querySelectorAll("button").forEach(btn => {
                    btn.addEventListener("click", e => {
                        e.stopPropagation();
                        const idx = +e.target.dataset.index;
                        const action = e.target.dataset.action;
                        if (action === "up" && idx > 0) {
                            [playlist[idx - 1], playlist[idx]] = [playlist[idx], playlist[idx - 1]];
                            adjustCurrent(idx, "up");
                        } else if (action === "down" && idx < playlist.length - 1) {
                            [playlist[idx + 1], playlist[idx]] = [playlist[idx], playlist[idx + 1]];
                            adjustCurrent(idx, "down");
                        } else if (action === "remove") {
                            playlist.splice(idx, 1);
                            currentIndex = Math.min(currentIndex, playlist.length - 1);
                        }
                        renderPlaylist();
                    });
                });
                playlistItemsDiv.appendChild(div);
            });
        }

        function adjustCurrent(idx, dir) {
            if (currentIndex === idx && dir === "up") currentIndex--;
            else if (currentIndex === idx && dir === "down") currentIndex++;
            else if (currentIndex === idx - 1 && dir === "up") currentIndex++;
            else if (currentIndex === idx + 1 && dir === "down") currentIndex--;
        }

        function playSelected(index) {
            if (!playlist[index]) return;
            currentIndex = index;
            playlistAudio.src = playlist[currentIndex].src;
            downloadBtn.href = playlist[currentIndex].src;
            playlistAudio.play().catch(() => { });
            renderPlaylist();
        }

        function addToPlaylist(audio) {
            playlist.push(audio);
            currentIndex = 0;
            if (playlist.length > 0) {
                playlistAudio.src = playlist[0].src;
                downloadBtn.href = playlist[0].src;
            }
            renderPlaylist();
        }

        playBtn.addEventListener("click", () => {
            if (!playlist.length) return;
            if (playlistAudio.paused) playlistAudio.play().catch(() => { });
            else playlistAudio.pause();
        });

        playlistAudio.addEventListener("play", () => playBtn.innerText = "暫停");
        playlistAudio.addEventListener("pause", () => playBtn.innerText = "播放");

        document.getElementById("next-btn").addEventListener("click", () => {
            if (!playlist.length) return;
            if (playMode === "隨機") currentIndex = Math.floor(Math.random() * playlist.length);
            else currentIndex = (currentIndex + 1) % playlist.length;
            playSelected(currentIndex);
        });

        document.getElementById("prev-btn").addEventListener("click", () => {
            if (!playlist.length) return;
            if (playMode === "隨機") currentIndex = Math.floor(Math.random() * playlist.length);
            else currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            playSelected(currentIndex);
        });

        document.getElementById("mode-btn").addEventListener("click", () => {
            playMode = playMode === "順序" ? "隨機" : playMode === "隨機" ? "循環" : "順序";
            document.getElementById("mode-btn").innerText = `:${playMode}`;
        });

        document.getElementById("clear-btn").addEventListener("click", () => {
            playlist = [];
            currentIndex = 0;
            playlistAudio.pause();
            playlistAudio.src = "";
            downloadBtn.href = "#";
            renderPlaylist();
        });

        playlistAudio.addEventListener("ended", () => {
            if (!playlist.length) return;
            if (playMode === "循環") playSelected(currentIndex);
            else document.getElementById("next-btn").click();
        });

        speedSelect.addEventListener("change", () => playlistAudio.playbackRate = parseFloat(speedSelect.value));

        playlistAudio.addEventListener("timeupdate", () => {
            if (playlistAudio.duration) progressBar.value = (playlistAudio.currentTime / playlistAudio.duration) * 100;
        });

        progressBar.addEventListener("input", () => {
            if (playlistAudio.duration) playlistAudio.currentTime = (progressBar.value / 100) * playlistAudio.duration;
        });

        const recommendationContainer = document.getElementById("recommendation-container");
        categories.forEach(category => {
            const container = document.createElement("div");
            container.className = "audio-row-container";

            const titleBar = document.createElement("div");
            titleBar.className = "audio-row-title";
            const titleSpan = document.createElement("span");
            titleSpan.innerText = category.name;
            const selectAllBtn = document.createElement("button");
            selectAllBtn.innerText = "全選";
            selectAllBtn.addEventListener("click", () => category.audios.forEach(a => addToPlaylist(a)));
            titleBar.appendChild(titleSpan);
            titleBar.appendChild(selectAllBtn);

            const row = document.createElement("div");
            row.className = "audio-row";
            category.audios.forEach(audio => {
                const item = document.createElement("div");
                item.className = "audio-item";
                item.innerHTML = `<div class="item-title">${audio.title}</div>
                    <div class="item-desc" data-full="${audio.description}">${audio.description}</div>
                    <button class="add-to-playlist">+</button>`;
                item.addEventListener("click", e => {
                    if (!e.target.classList.contains("add-to-playlist")) showDetailPage(audio);
                });
                item.querySelector(".add-to-playlist").addEventListener("click", e => {
                    e.stopPropagation();
                    addToPlaylist(audio);
                });
                row.appendChild(item);
            });

            container.appendChild(titleBar);
            container.appendChild(row);
            recommendationContainer.appendChild(container);
        });

        function showDetailPage(audio) {
            document.querySelectorAll("audio").forEach(a => a.pause());
            detailAudio.src = audio.src;
            detailAudio.play().catch(() => { });
            document.getElementById("detail-title").innerText = audio.title;
            document.getElementById("detail-description").innerText = audio.description;
            mainPage.style.display = "none";
            detailPage.style.display = "block";
        }

        document.getElementById("back-btn").addEventListener("click", () => {
            detailAudio.pause();
            detailAudio.currentTime = 0;
            detailPage.style.display = "none";
            mainPage.style.display = "block";
        });
    </script>
    <script data-goatcounter="https://bitterlive.goatcounter.com/count" async src="/JS/count.js">
    </script>
</body>

</html>
