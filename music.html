<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music.from.Heaven</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
        }

        .audio-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 18px;
            color: #ccc;
        }

        .audio-row-container {
            margin-bottom: 30px;
            position: relative;
        }

        .audio-row-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .audio-row {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 10px;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
        }

        .audio-row::-webkit-scrollbar {
            height: 8px;
        }

        .audio-row::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .audio-item {
            flex: 0 0 auto;
            width: 200px;
            background: #222;
            padding: 10px;
            cursor: pointer;
            position: relative;
            border-radius: 5px;
            transition: transform 0.2s;
            scroll-snap-align: start;
        }

        .audio-item:hover {
            transform: scale(1.05);
        }

        .item-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .item-desc {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-desc:hover::after {
            content: attr(data-full);
            position: absolute;
            left: 0;
            top: 60px;
            background: #333;
            color: #fff;
            padding: 5px;
            white-space: normal;
            width: 200px;
            z-index: 10;
            border-radius: 5px;
        }

        .scroll-hint {
            position: absolute;
            right: 10px;
            top: 40%;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            font-size: 12px;
            border-radius: 4px;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #detail-page {
            display: none;
        }

        .audio-player {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }

        .audio-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .audio-description {
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 12px;
            background-color: #ff4500;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 播放列表小窗體 */
        #playlist {
            background: #1c1c1c;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        #playlist h3 {
            margin: 5px 0 10px 0;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px;
            border-bottom: 1px solid #333;
            transition: background 0.2s;
        }

        .playlist-item.active {
            background-color: #ff4500;
        }

        .playlist-item span {
            flex: 1;
            margin-right: 10px;
        }

        .playlist-item button {
            margin-left: 5px;
            padding: 2px 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            background: #ff4500;
            color: white;
        }

        .playlist-controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }

        .playlist-controls button {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: #ff4500;
            color: white;
        }

        @media (max-width: 600px) {
            .audio-item {
                width: 90%;
                min-width: 250px;
            }

            .page-header h1 {
                font-size: 28px;
            }

            .page-header p {
                font-size: 16px;
            }

            .audio-title {
                font-size: 20px;
            }

            .audio-description {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <!-- 主頁 -->
    <div id="main-page" class="audio-page">
        <div class="page-header">
            <h1>推薦天國的音樂</h1>
            <p>天音淨樂:所有音樂來源於[天音網]</p>
        </div>

        <!-- 播放列表小窗體 -->
        <div id="playlist">
            <h3>播放列表</h3>
            <div id="playlist-items"></div>
            <div class="playlist-controls">
                <button id="prev-btn">上一首</button>
                <button id="play-btn">播放/暫停</button>
                <button id="next-btn">下一首</button>
                <button id="mode-btn">模式: 順序</button>
            </div>
        </div>

        <!-- 推薦音頻區 -->
        <div id="recommendation-container"></div>
    </div>

    <!-- 單獨播放頁面 -->
    <div id="detail-page" class="audio-page">
        <a class="back-btn" id="back-btn">返回</a>
        <div class="audio-player">
            <audio id="detail-audio" src="" controls controlsList="nodownload"></audio>
        </div>
        <div class="audio-title" id="detail-title"></div>
        <div class="audio-description" id="detail-description"></div>
    </div>

    <script>
        const categories = [
            {
                name: "推薦",
                audios: [
                    { src: "./resource/tianyi.mp3", title: "天音淨樂 1", description: "天音淨樂 1 天意" },
                    { src: "./resource/xiyuan.mp3", title: "天音淨樂 2", description: "天音淨樂 2 惜緣" },
                    { src: "./resource/dsg.mp3", title: "天音淨樂 3", description: "天音淨樂 3   登山高" }
                ]
            },
            {
                name: "最新",
                audios: [
                    { src: "./resource/mp3/01.mp3", title: "天音淨樂 1", description: "天音淨樂 大唐的記憶" },
                    { src: "./resource/mp3/02.mp3", title: "天音淨樂 2", description: "天音淨樂 无语凝咽" },
                    { src: "./resource/mp3/03.mp3", title: "天音淨樂 3", description: "天音淨樂 中国心" },
                    { src: "./resource/mp3/04.mp3", title: "天音淨樂 4", description: "天音淨樂 夜思" },
                    { src: "./resource/mp3/05.mp3", title: "天音淨樂 5", description: "天音淨樂 盛世" },
                    { src: "./resource/mp3/06.mp3", title: "天音淨樂 6", description: "天音淨樂 山河" },
                    { src: "./resource/mp3/07.mp3", title: "天音淨樂 7", description: "天音淨樂 敬悼" },
                    { src: "./resource/mp3/08.mp3", title: "天音淨樂 8", description: "天音淨樂 归途" },
                    { src: "./resource/mp3/09.mp3", title: "天音淨樂 9", description: "天音淨樂 古道" },
                    { src: "./resource/mp3/10.mp3", title: "天音淨樂 10", description: "天音淨樂 风动玲动心不动" },
                    { src: "./resource/mp3/11.mp3", title: "天音淨樂 11", description: "天音淨樂 赴" },
                    { src: "./resource/mp3/12.mp3", title: "天音淨樂 12", description: "天音淨樂 世间梦幻" },
                    { src: "./resource/mp3/13.mp3", title: "天音淨樂 13", description: "天音淨樂 尊容" }
                ]
            }
        ];

        const recommendationContainer = document.getElementById("recommendation-container");
        const mainPage = document.getElementById("main-page");
        const detailPage = document.getElementById("detail-page");
        const detailAudio = document.getElementById("detail-audio");

        // 播放列表管理
        const playlistItemsDiv = document.getElementById("playlist-items");
        let playlist = [];
        let currentIndex = 0;
        let playMode = "順序";

        function renderPlaylist() {
            playlistItemsDiv.innerHTML = "";
            playlist.forEach((audio, index) => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "playlist-item";
                if (index === currentIndex) itemDiv.classList.add("active");
                itemDiv.innerHTML = `
                    <span>${audio.title}</span>
                    <div>
                        <button data-action="up" data-index="${index}">↑</button>
                        <button data-action="down" data-index="${index}">↓</button>
                        <button data-action="remove" data-index="${index}">移除</button>
                    </div>
                `;
                playlistItemsDiv.appendChild(itemDiv);

                itemDiv.querySelectorAll("button").forEach(btn => {
                    btn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const idx = parseInt(e.target.dataset.index);
                        const action = e.target.dataset.action;
                        if (action === "up" && idx > 0) {
                            [playlist[idx - 1], playlist[idx]] = [playlist[idx], playlist[idx - 1]];
                            if (currentIndex === idx) currentIndex = idx - 1;
                            else if (currentIndex === idx - 1) currentIndex = idx;
                        } else if (action === "down" && idx < playlist.length - 1) {
                            [playlist[idx + 1], playlist[idx]] = [playlist[idx], playlist[idx + 1]];
                            if (currentIndex === idx) currentIndex = idx + 1;
                            else if (currentIndex === idx + 1) currentIndex = idx;
                        } else if (action === "remove") {
                            playlist.splice(idx, 1);
                            if (currentIndex >= playlist.length) currentIndex = playlist.length - 1;
                        }
                        renderPlaylist();
                    });
                });

                // 點擊切換播放
                itemDiv.addEventListener("click", () => {
                    currentIndex = index;
                    playCurrent();
                    renderPlaylist();
                });
            });
        }

        function playCurrent() {
            if (!playlist[currentIndex]) return;
            detailAudio.src = playlist[currentIndex].src;
            detailAudio.play();
            renderPlaylist();
        }

        document.getElementById("play-btn").addEventListener("click", () => {
            if (detailAudio.paused) detailAudio.play();
            else detailAudio.pause();
        });

        document.getElementById("next-btn").addEventListener("click", () => {
            if (!playlist.length) return;
            if (playMode === "隨機") {
                currentIndex = Math.floor(Math.random() * playlist.length);
            } else {
                currentIndex = (currentIndex + 1) % playlist.length;
            }
            playCurrent();
        });

        document.getElementById("prev-btn").addEventListener("click", () => {
            if (!playlist.length) return;
            if (playMode === "隨機") {
                currentIndex = Math.floor(Math.random() * playlist.length);
            } else {
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            }
            playCurrent();
        });

        document.getElementById("mode-btn").addEventListener("click", () => {
            if (playMode === "順序") playMode = "隨機";
            else if (playMode === "隨機") playMode = "循環";
            else playMode = "順序";
            document.getElementById("mode-btn").innerText = `模式: ${playMode}`;
        });

        detailAudio.addEventListener("ended", () => {
            if (!playlist.length) return;
            if (playMode === "循環") playCurrent();
            else document.getElementById("next-btn").click();
        });

        // 生成音頻推薦列表
        categories.forEach(category => {
            const categoryDiv = document.createElement("div");
            categoryDiv.className = "audio-row-container";

            const title = document.createElement("div");
            title.className = "audio-row-title";
            title.innerText = category.name;

            const row = document.createElement("div");
            row.className = "audio-row";

            const hint = document.createElement("div");
            hint.className = "scroll-hint";
            hint.innerText = "→ 滑動查看更多";
            let hintShown = false;

            row.addEventListener("scroll", () => {
                if (!hintShown && row.scrollLeft > 0) hint.style.opacity = 0, hintShown = true;
            });

            function updateScrollHint() {
                if (row.scrollWidth > row.clientWidth && !hintShown) hint.style.opacity = 1;
                else hint.style.opacity = 0;
            }

            window.addEventListener("resize", updateScrollHint);
            setTimeout(updateScrollHint, 100);

            category.audios.forEach(audio => {
                const item = document.createElement("div");
                item.className = "audio-item";
                item.innerHTML = `
                    <div class="item-title">${audio.title}</div>
                    <div class="item-desc" data-full="${audio.description}">${audio.description}</div>
                    <button class="add-to-playlist">+</button>
                `;

                // 單擊播放
                item.addEventListener("click", (e) => {
                    if (e.target.classList.contains("add-to-playlist")) return;
                    showDetailPage(audio);
                });

                // 加入播放列表按鈕
                item.querySelector(".add-to-playlist").addEventListener("click", (e) => {
                    e.stopPropagation();
                    playlist.push(audio);
                    renderPlaylist();
                });

                row.appendChild(item);
            });

            categoryDiv.appendChild(title);
            categoryDiv.appendChild(row);
            categoryDiv.appendChild(hint);
            recommendationContainer.appendChild(categoryDiv);
        });

        function showDetailPage(audio) {
            document.querySelectorAll("audio").forEach(v => { v.pause(); v.currentTime = 0; });
            detailAudio.src = audio.src;
            detailAudio.play();
            document.getElementById("detail-title").innerText = audio.title;
            document.getElementById("detail-description").innerText = audio.description;
            mainPage.style.display = "none";
            detailPage.style.display = "block";
        }

        document.getElementById("back-btn").addEventListener("click", () => {
            detailAudio.pause();
            detailAudio.currentTime = 0;
            detailPage.style.display = "none";
            mainPage.style.display = "block";
        });
    </script>
</body>
</html>
