        // 生成星星
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 300; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3.5 + 1.2;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDuration = `${Math.random() * 4 + 3.5}s`;
                star.style.animationDelay = `-${Math.random() * 6}s`;
                container.appendChild(star);
            }
        }

        function renderCards(sites) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            sites.forEach(site => {
                const card = document.createElement('a');
                card.href = site.url;
                card.target = "_blank";
                card.className = "link-card";
                card.innerHTML = `
                    <h3>${site.name}</h3>
                    <div class="domain">${site.url.replace('https://', '').replace('www.', '')}</div>
                    <div class="desc">${site.desc}</div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('count').textContent = `共 ${sites.length} 個網站`;
        }

        function setupSearch() {
            const input = document.getElementById('search');
            input.addEventListener('input', () => {
                const term = input.value.toLowerCase().trim();
                const filtered = websites.filter(site =>
                    site.name.toLowerCase().includes(term) ||
                    site.desc.toLowerCase().includes(term)
                );
                renderCards(filtered);
            });
        }

        window.onload = () => {
            createStars();
            renderCards(websites);
            setupSearch();
        };
