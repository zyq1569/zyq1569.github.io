<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For.U</title>
    <style>
        /* 全局 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            height: 100%;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            overflow-x: hidden;
            color: #fff;
        }

        /* 背景 */
        #background {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1920&auto=format&fit=crop') center/cover no-repeat;
            z-index: 1;
        }

        /* 星空 */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }

        /* header */
        .header {
            position: relative;
            z-index: 3;
            background: rgba(22, 119, 255, 0.7);
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
        }

        /* 控制条（保留你优化版本） */
        .top-right {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: nowrap;
            width: 100%;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            flex: 1;
            gap: 3px;
        }

        .tab-btn {
            flex: 1;
            min-width: 0;
            padding: 4px 0;
            font-size: clamp(8px, 1.8vw, 12px);
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            cursor: pointer;
            white-space: nowrap;
            text-align: center;
        }

        .tab-btn.active {
            background: #52c41a;
        }

        .top-right input,
        .top-right select,
        .home-btn {
            flex: 0 0 auto;
            padding: 4px;
            font-size: 11px;
            border: none;
            border-radius: 6px;
        }

        .home-btn {
            background: #52c41a;
            color: #fff;
        }

        /* 主体 */
        .container {
            position: relative;
            z-index: 3;
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            padding: 15px;
            border-radius: 10px;
        }

        .card-title {
            font-size: 16px;
            margin-bottom: 6px;
        }

        .card-desc {
            color: #ddd;
            font-size: 13px;
            min-height: 40px;
        }

        .card-time {
            font-size: 12px;
            margin-top: 6px;
        }

        .download-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 10px;
            background: #1677ff;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
        }

        .empty {
            color: #ccc;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div id="background"></div>
    <canvas id="particles"></canvas>

    <div class="header">

        <div class="top-right">

            <button class="home-btn" onclick="goHome()">返回</button>
            <div class="tabs">
                <button class="tab-btn active" data-type="全部">全部</button>
                <button class="tab-btn" data-type="工具">工具</button>
                <button class="tab-btn" data-type="開發">開發</button>
                <button class="tab-btn" data-type="數據">數據</button>
                <button class="tab-btn" data-type="文件">文件</button>
            </div>

            <input type="text" id="search" placeholder="搜索">
            <select id="sortType">
                <option value="time">時間</option>
                <option value="name">名稱</option>
                <option value="desc">說明</option>
            </select>
        </div>
    </div>

    <div class="container">

        <div class="section">
            <div class="section-title">🔥 最新5筆</div>
            <div id="latestList" class="cards"></div>
        </div>

        <div class="section">
            <div class="section-title">📚 歷史下載</div>
            <div id="historyList" class="cards"></div>
        </div>

    </div>

    <script>

        /* 星空 */
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        let w = canvas.width = innerWidth;
        let h = canvas.height = innerHeight;

        const stars = Array.from({ length: 120 }, () => ({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.3,
            dx: (Math.random() - 0.5) * 0.2,
            dy: (Math.random() - 0.5) * 0.2
        }));

        function draw() {
            ctx.clearRect(0, 0, w, h);
            stars.forEach(s => {
                s.x += s.dx; s.y += s.dy;
                if (s.x < 0) s.x = w;
                if (s.x > w) s.x = 0;
                if (s.y < 0) s.y = h;
                if (s.y > h) s.y = 0;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        addEventListener('resize', () => {
            w = canvas.width = innerWidth;
            h = canvas.height = innerHeight;
        });

        /* 数据 */
        let allData = [];
        let currentType = "全部";

        async function load() {
            const res = await fetch("./data/down.json?t=" + Date.now());
            allData = await res.json();
            render();
        }

        /* 分类 */
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentType = btn.dataset.type;
                render();
            };
        });

        /* 搜索 */
        document.getElementById("search").oninput = render;
        document.getElementById("sortType").onchange = render;

        /* render */
        function render() {

            let keyword = document.getElementById("search").value.toLowerCase();
            let sort = document.getElementById("sortType").value;

            let data = [...allData];

            if (currentType !== "全部") {
                data = data.filter(i => i.category === currentType);
            }

            data = data.filter(i =>
                i.name.toLowerCase().includes(keyword) ||
                i.desc.toLowerCase().includes(keyword) ||
                i.time.toLowerCase().includes(keyword)
            );

            if (sort === "time") {
                data.sort((a, b) => new Date(b.time) - new Date(a.time));
            } else if (sort === "name") {
                data.sort((a, b) => a.name.localeCompare(b.name));
            } else {
                data.sort((a, b) => a.desc.localeCompare(b.desc));
            }

            /* 最新5条 */
            const latest = data.slice(0, 5);
            document.getElementById("latestList").innerHTML =
                latest.length ? latest.map(card).join("") : "<div class='empty'>暂无</div>";

            /* 历史 = 剩余全部 */
            const history = data.slice(5);
            document.getElementById("historyList").innerHTML =
                history.length ? history.map(card).join("") : "<div class='empty'>暂无</div>";
        }
        function card(i) {
            return `
            <div class="card">
            <div class="card-title">${i.name}</div>
            <div class="card-desc">${i.desc}</div>
            <div class="card-time">${i.time}</div>
            <a class="download-btn" href="${i.url}" target="_blank">下载</a>
            </div>`;
        }

        function goHome() {
            location.href = "https://zyq1569.github.io/ai";
            // https://zyq1569.github.io/ai
        }

        load();

    </script>

</body>

</html>
