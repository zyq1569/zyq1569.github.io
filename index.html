<canvas id="c"></canvas>

<script>

/////////////////////////////////////////////////////////
// Canvas
/////////////////////////////////////////////////////////

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w,h,cx,cy;

function resize(){

    w = canvas.width =
        innerWidth * devicePixelRatio;

    h = canvas.height =
        innerHeight * devicePixelRatio;

    canvas.style.width =
        innerWidth + "px";

    canvas.style.height =
        innerHeight + "px";

    cx = w / 2;
    cy = h / 2;
}

window.addEventListener("resize",resize);

resize();

/////////////////////////////////////////////////////////
// 参数
/////////////////////////////////////////////////////////

const galaxyStars = [];
const galaxyDust = [];
const bgStars = [];
const pinkNebulas = [];

const GALAXY_RADIUS =
    Math.min(w,h) * 0.34;

const ARM_COUNT = 4;

/////////////////////////////////////////////////////////
// 高斯随机
/////////////////////////////////////////////////////////

function gaussian(){

    let u = 0;
    let v = 0;

    while(u === 0) u = Math.random();
    while(v === 0) v = Math.random();

    return Math.sqrt(
        -2 * Math.log(u)
    ) * Math.cos(
        2 * Math.PI * v
    );
}

/////////////////////////////////////////////////////////
// 背景星空
/////////////////////////////////////////////////////////

for(let i=0;i<2200;i++){

    bgStars.push({

        x:Math.random()*w,
        y:Math.random()*h,

        size:
            Math.random()*2,

        alpha:
            0.2 + Math.random()*0.8,

        twinkle:
            Math.random()*10
    });
}

/////////////////////////////////////////////////////////
// 银河恒星（降低密度）
/////////////////////////////////////////////////////////

const STAR_COLORS = [

    [255,255,255],
    [170,210,255],
    [120,170,255],
    [255,220,180],
    [255,245,220],
    [255,180,120]
];

for(let i=0;i<7000;i++){

    const r =
        Math.pow(
            Math.random(),
            0.55
        ) * GALAXY_RADIUS;

    const arm =
        i % ARM_COUNT;

    const base =
        arm * Math.PI * 2 / ARM_COUNT;

    /////////////////////////////////////////////////////
    // 旋臂扩散
    /////////////////////////////////////////////////////

    const angle =
        base +
        r * 0.018 +
        gaussian() * 0.32;

    /////////////////////////////////////////////////////
    // 星星尺寸
    /////////////////////////////////////////////////////

    const size =
        0.25 +
        Math.random()*1.2 +
        Math.pow(
            1-r/GALAXY_RADIUS,
            2
        ) * 2;

    /////////////////////////////////////////////////////
    // 星星颜色
    /////////////////////////////////////////////////////

    const color =
        STAR_COLORS[
            Math.floor(
                Math.random()
                * STAR_COLORS.length
            )
        ];

    galaxyStars.push({

        r,
        angle,
        size,
        color,

        twinkle:
            Math.random()*5
    });
}

/////////////////////////////////////////////////////////
// 尘埃带（降低密度）
/////////////////////////////////////////////////////////

for(let i=0;i<4500;i++){

    const r =
        Math.pow(
            Math.random(),
            0.75
        ) * GALAXY_RADIUS;

    const arm =
        Math.floor(
            Math.random()*4
        );

    const base =
        arm * Math.PI*2/4;

    const angle =
        base +
        r * 0.018 +
        gaussian()*0.18;

    galaxyDust.push({

        r,
        angle,

        size:
            1 +
            Math.random()*3,

        alpha:
            0.015 +
            Math.random()*0.04
    });
}

/////////////////////////////////////////////////////////
// 粉色星云
/////////////////////////////////////////////////////////

for(let i=0;i<120;i++){

    const r =
        Math.random()
        * GALAXY_RADIUS;

    const angle =
        r*0.018 +
        Math.random()*Math.PI*2;

    pinkNebulas.push({

        r,
        angle,

        size:
            10 +
            Math.random()*25,

        alpha:
            0.03 +
            Math.random()*0.06
    });
}

/////////////////////////////////////////////////////////
// 动画
/////////////////////////////////////////////////////////

let rotation = 0;
let last = performance.now();

function draw(time){

    const dt =
        (time-last)*0.001;

    last = time;

    /////////////////////////////////////////////////////
    // 缓慢旋转
    /////////////////////////////////////////////////////

    rotation += dt * 0.008;

    /////////////////////////////////////////////////////
    // 背景
    /////////////////////////////////////////////////////

    const bg =
        ctx.createRadialGradient(
            cx,cy,0,
            cx,cy,
            Math.max(w,h)
        );

    bg.addColorStop(0,"#07111d");
    bg.addColorStop(0.4,"#02050b");
    bg.addColorStop(1,"#000000");

    ctx.fillStyle = bg;

    ctx.fillRect(0,0,w,h);

    /////////////////////////////////////////////////////
    // 背景星空
    /////////////////////////////////////////////////////

    for(const s of bgStars){

        const alpha =
            s.alpha *
            (
                0.75 +
                Math.sin(
                    time*0.0003
                    + s.twinkle
                ) * 0.25
            );

        ctx.fillStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.beginPath();

        ctx.arc(
            s.x,
            s.y,
            s.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    /////////////////////////////////////////////////////
    // 银河
    /////////////////////////////////////////////////////

    ctx.save();

    ctx.translate(cx,cy);

    /////////////////////////////////////////////////////
    // 倾斜银河
    /////////////////////////////////////////////////////

    ctx.rotate(-0.32);

    /////////////////////////////////////////////////////
    // 银河整体旋转
    /////////////////////////////////////////////////////

    ctx.rotate(rotation);

    /////////////////////////////////////////////////////
    // 蓝色星云主体
    /////////////////////////////////////////////////////

    for(let i=0;i<32;i++){

        const rr =
            GALAXY_RADIUS *
            (0.25 + i/32);

        ///////////////////////////////////////////////////
        // 增强星云
        ///////////////////////////////////////////////////

        const alpha =
            0.05 *
            (1-i/32);

        const g =
            ctx.createRadialGradient(
                0,0,0,
                0,0,rr
            );

        g.addColorStop(
            0,
            `rgba(
                120,
                180,
                255,
                ${alpha}
            )`
        );

        g.addColorStop(
            0.5,
            `rgba(
                50,
                120,
                255,
                ${alpha*0.8}
            )`
        );

        g.addColorStop(
            1,
            `rgba(0,0,0,0)`
        );

        ctx.fillStyle = g;

        ctx.beginPath();

        ctx.ellipse(
            0,
            0,
            rr*1.3,
            rr*0.34,
            0,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    /////////////////////////////////////////////////////
    // 尘埃带
    /////////////////////////////////////////////////////

    ctx.globalCompositeOperation =
        "multiply";

    for(const d of galaxyDust){

        const x =
            Math.cos(d.angle)
            * d.r;

        const y =
            Math.sin(d.angle)
            * d.r * 0.34;

        ctx.fillStyle =
            `rgba(
                30,
                20,
                10,
                ${d.alpha}
            )`;

        ctx.beginPath();

        ctx.arc(
            x,
            y,
            d.size*5,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    /////////////////////////////////////////////////////
    // 恒星层
    /////////////////////////////////////////////////////

    ctx.globalCompositeOperation =
        "lighter";

    for(const s of galaxyStars){

        const x =
            Math.cos(s.angle)
            * s.r;

        const y =
            Math.sin(s.angle)
            * s.r * 0.34;

        ///////////////////////////////////////////////////
        // 闪烁
        ///////////////////////////////////////////////////

        const pulse =
            0.7 +
            Math.sin(
                time*0.001
                + s.twinkle
            ) * 0.3;

        ///////////////////////////////////////////////////
        // 降低亮度
        ///////////////////////////////////////////////////

        const alpha =
            pulse *
            (
                0.12 +
                (1-s.r/GALAXY_RADIUS)
                * 0.55
            );

        ///////////////////////////////////////////////////
        // 星体辉光（缩小）
        ///////////////////////////////////////////////////

        const glow =
            ctx.createRadialGradient(
                x,y,0,
                x,y,s.size*2.2
            );

        glow.addColorStop(
            0,
            `rgba(
                ${s.color[0]},
                ${s.color[1]},
                ${s.color[2]},
                ${alpha}
            )`
        );

        glow.addColorStop(
            1,
            `rgba(
                ${s.color[0]},
                ${s.color[1]},
                ${s.color[2]},
                0
            )`
        );

        ctx.fillStyle = glow;

        ctx.beginPath();

        ctx.arc(
            x,
            y,
            s.size*3.5,
            0,
            Math.PI*2
        );

        ctx.fill();

        ///////////////////////////////////////////////////
        // 星核
        ///////////////////////////////////////////////////

        ctx.fillStyle =
            `rgba(255,255,255,${alpha})`;

        ctx.beginPath();

        ctx.arc(
            x,
            y,
            s.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    /////////////////////////////////////////////////////
    // 粉色星云团
    /////////////////////////////////////////////////////

    for(const n of pinkNebulas){

        const x =
            Math.cos(n.angle)
            * n.r;

        const y =
            Math.sin(n.angle)
            * n.r * 0.34;

        const neb =
            ctx.createRadialGradient(
                x,y,0,
                x,y,n.size
            );

        neb.addColorStop(
            0,
            `rgba(
                255,
                120,
                180,
                ${n.alpha}
            )`
        );

        neb.addColorStop(
            1,
            `rgba(
                255,
                120,
                180,
                0
            )`
        );

        ctx.fillStyle = neb;

        ctx.beginPath();

        ctx.arc(
            x,
            y,
            n.size,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    /////////////////////////////////////////////////////
    // 银河核心
    /////////////////////////////////////////////////////

    const core =
        ctx.createRadialGradient(
            0,0,0,
            0,0,
            GALAXY_RADIUS*0.22
        );

    core.addColorStop(
        0,
        "rgba(255,255,255,1)"
    );

    core.addColorStop(
        0.15,
        "rgba(255,250,220,1)"
    );

    core.addColorStop(
        0.35,
        "rgba(255,235,120,0.95)"
    );

    core.addColorStop(
        0.6,
        "rgba(255,170,70,0.45)"
    );

    core.addColorStop(
        1,
        "rgba(255,120,30,0)"
    );

    ctx.fillStyle = core;

    ctx.beginPath();

    ctx.ellipse(
        0,
        0,
        GALAXY_RADIUS*0.22,
        GALAXY_RADIUS*0.09,
        0,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.restore();



    /////////////////////////////////////////////////////
    // 暗角
    /////////////////////////////////////////////////////
/////////////////////////////////////////////////////////
// 银河外围时钟
/////////////////////////////////////////////////////////
// 时钟闪现（2秒隐藏 + 1秒显示）
/////////////////////////////////////////////////////////

const blinkCycle = 15000;

// 0~2999
const blinkTime =
    time % blinkCycle;

// 前1000ms显示
const clockVisible =
    blinkTime < 12000;

// 淡入淡出
let clockAlpha = 0;

if(clockVisible){

    // clockAlpha =
    //     Math.sin(
    //         blinkTime / 1000 * Math.PI
    //     );

    if(clockVisible){

    /////////////////////////////////////////////////////
    // 前0.8秒淡入
    /////////////////////////////////////////////////////

    if(blinkTime < 800){

        clockAlpha =
            blinkTime / 800;

    /////////////////////////////////////////////////////
    // 最后0.8秒淡出
    /////////////////////////////////////////////////////

    }else if(blinkTime > 11200){

        clockAlpha =
            1 -
            (blinkTime - 11200) / 800;

    /////////////////////////////////////////////////////
    // 中间稳定显示
    /////////////////////////////////////////////////////

    }else{

        clockAlpha = 1;
    }

}else{

    clockAlpha = 0;
}
}else{

    clockAlpha = 0;
}
/////////////////////////////////////////////////////////

const clockRadius =
    GALAXY_RADIUS * 1.18;

/////////////////////////////////////////////////////////
// 发光圆环
/////////////////////////////////////////////////////////

ctx.save();

ctx.translate(cx,cy);

const ring =
    ctx.createRadialGradient(
        0,0,
        clockRadius*0.9,

        0,0,
        clockRadius
    );

ring.addColorStop(
    0,
    "rgba(120,180,255,0)"
);

ring.addColorStop(
    1,
    "rgba(120,180,255,0.18)"
);

// ctx.strokeStyle = ring;

// ctx.lineWidth = 5;

// ctx.beginPath();

// ctx.arc(
//     0,
//     0,
//     clockRadius,
//     0,
//     Math.PI*2
// );

// ctx.stroke();

/////////////////////////////////////////////////////////
// 时间
/////////////////////////////////////////////////////////
ctx.strokeStyle =
    `rgba(120,180,255,${0.22*clockAlpha})`;

ctx.lineWidth = 3;

/////////////////////////////////////////////////////////
// 虚线
/////////////////////////////////////////////////////////

ctx.setLineDash([12,18]);

ctx.lineDashOffset =
    -time * 0.01;

ctx.shadowBlur = 20;

ctx.shadowColor =
    "rgba(120,180,255,0.9)";

ctx.beginPath();

ctx.arc(
    0,
    0,
    clockRadius,
    0,
    Math.PI*2
);

ctx.stroke();

ctx.setLineDash([]);
const now = new Date();

const ms =
    now.getMilliseconds();

const sec =
    now.getSeconds() +
    ms/1000;

const min =
    now.getMinutes() +
    sec/60;

const hour =
    (now.getHours()%12) +
    min/60;

/////////////////////////////////////////////////////////
// 刻度
/////////////////////////////////////////////////////////

for(let i=0;i<60;i++){

    const a =
        Math.PI*2 * i/60
        - Math.PI/2;

    const isHour =
        i % 5 === 0;

    const r1 =
        clockRadius
        - (isHour ? 24 : 10);

    const r2 =
        clockRadius;

    const x1 =
        Math.cos(a)*r1;

    const y1 =
        Math.sin(a)*r1;

    const x2 =
        Math.cos(a)*r2;

    const y2 =
        Math.sin(a)*r2;

    // ctx.strokeStyle =
    //     isHour
    //     ?
    //     "rgba(255,255,255,0.95)"
    //     :
    //     "rgba(180,220,255,0.45)";
ctx.strokeStyle =
    isHour
    ?
    `rgba(255,255,255,${0.95*clockAlpha})`
    :
    `rgba(180,220,255,${0.45*clockAlpha})`;
    ctx.lineWidth =
        isHour ? 3 : 1;

    ctx.beginPath();

    ctx.moveTo(x1,y1);

    ctx.lineTo(x2,y2);

    ctx.stroke();
}

/////////////////////////////////////////////////////////
// 12小时数字
/////////////////////////////////////////////////////////

// ctx.fillStyle =
//     "rgba(255,255,255,0.95)";
ctx.fillStyle =
    `rgba(255,255,255,${0.95*clockAlpha})`;

ctx.font =
    `${clockRadius*0.08}px serif`;

ctx.textAlign = "center";
ctx.textBaseline = "middle";

for(let i=1;i<=12;i++){

    const a =
        Math.PI*2 * i/12
        - Math.PI/2;

    const r =
        clockRadius - 48;

    const x =
        Math.cos(a)*r;

    const y =
        Math.sin(a)*r;

    ctx.shadowBlur = 18;

    ctx.shadowColor =
        "rgba(120,180,255,0.9)";

    ctx.fillText(
        i,
        x,
        y
    );
}

/////////////////////////////////////////////////////////
/////////////////////////////////////////////////////////
// 清除前面数字留下的辉光
/////////////////////////////////////////////////////////

ctx.shadowBlur = 10;

ctx.shadowColor =
    `rgba(120,180,255,${0.5*clockAlpha})`;
// 十二时辰
/////////////////////////////////////////////////////////

const shichen = [

    "子",
    "丑",
    "寅",
    "卯",
    "辰",
    "巳",

    "午",
    "未",
    "申",
    "酉",
    "戌",
    "亥"
];

// ctx.font =
//     `${clockRadius*0.055}px serif`;

// ctx.fillStyle =
//     "rgba(120,180,255,0.85)";

// for(let i=0;i<12;i++){

//     const a =
//         Math.PI*2 * i/12
//         - Math.PI/2;

//     const r =
//         clockRadius - 88;

//     const x =
//         Math.cos(a)*r;

//     const y =
//         Math.sin(a)*r;

//     ctx.fillText(
//         shichen[i],
//         x,
//         y
//     );
// }
if(clockAlpha > 0.01){

    ctx.font =
        `${clockRadius*0.055}px serif`;

    ctx.fillStyle =
        `rgba(
            120,
            180,
            255,
            ${0.85*clockAlpha}
        )`;

    /////////////////////////////////////////////////////
    // 时辰辉光
    /////////////////////////////////////////////////////

    ctx.shadowBlur =
        10 * clockAlpha;

    ctx.shadowColor =
        `rgba(
            120,
            180,
            255,
            ${0.5*clockAlpha}
        )`;

    for(let i=0;i<12;i++){

        const a =
            Math.PI*2 * i/12
            - Math.PI/2;

        const r =
            clockRadius - 88;

        const x =
            Math.cos(a)*r;

        const y =
            Math.sin(a)*r;

        ctx.fillText(
            shichen[i],
            x,
            y
        );
    }

    /////////////////////////////////////////////////////
    // 清除阴影状态
    /////////////////////////////////////////////////////

    ctx.shadowBlur = 0;
    ctx.shadowColor = "transparent";
}

/////////////////////////////////////////////////////////
// 春夏秋冬
/////////////////////////////////////////////////////////

if(clockAlpha > 0.01){

    const seasons = [

        {
            text:"春",
            angle:-Math.PI/2,
            color:"120,255,160"
        },

        {
            text:"夏",
            angle:0,
            color:"255,180,120"
        },

        {
            text:"秋",
            angle:Math.PI/2,
            color:"255,220,120"
        },

        {
            text:"冬",
            angle:Math.PI,
            color:"180,220,255"
        }
    ];

    /////////////////////////////////////////////////////
    // 字体
    /////////////////////////////////////////////////////

    ctx.font =
        `${clockRadius*0.085}px serif`;

    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    /////////////////////////////////////////////////////
    // 绘制
    /////////////////////////////////////////////////////

    for(const s of seasons){

        ///////////////////////////////////////////////////
        // 位置（比数字更外一层）
        ///////////////////////////////////////////////////

        const r =
            clockRadius + 17;

        const x =
            Math.cos(s.angle) * r;

        const y =
            Math.sin(s.angle) * r;

        ///////////////////////////////////////////////////
        // 发光
        ///////////////////////////////////////////////////

        ctx.shadowBlur =
            22 * clockAlpha;

        ctx.shadowColor =
            `rgba(
                ${s.color},
                ${0.95*clockAlpha}
            )`;

        ///////////////////////////////////////////////////
        // 文字颜色
        ///////////////////////////////////////////////////

        ctx.fillStyle =
            `rgba(
                ${s.color},
                ${0.95*clockAlpha}
            )`;

        ///////////////////////////////////////////////////
        // 绘制文字
        ///////////////////////////////////////////////////

        ctx.fillText(
            s.text,
            x,
            y
        );
    }

    /////////////////////////////////////////////////////
    // 清除辉光状态
    /////////////////////////////////////////////////////

    ctx.shadowBlur = 0;

    ctx.shadowColor =
        "transparent";
}

/////////////////////////////////////////////////////////
// 时针
/////////////////////////////////////////////////////////

function drawHand(
    angle,
    length,
    width,
    color
){

    ctx.save();

    ctx.rotate(angle);

    ctx.strokeStyle = color;

    ctx.lineWidth = width;

    ctx.lineCap = "round";

    ctx.shadowBlur = 18;

    ctx.shadowColor = color;

    ctx.beginPath();

    ctx.moveTo(0,12);

    ctx.lineTo(0,-length);

    ctx.stroke();

    ctx.restore();
}

/////////////////////////////////////////////////////////
// 指针角度
/////////////////////////////////////////////////////////

const secAngle =
    Math.PI*2 * sec/60;

const minAngle =
    Math.PI*2 * min/60;

const hourAngle =
    Math.PI*2 * hour/12;

/////////////////////////////////////////////////////////
// 时针
/////////////////////////////////////////////////////////

// drawHand(
//     hourAngle,
//     clockRadius*0.42,
//     7,
//     "rgba(255,220,160,0.95)"
// );
drawHand(
    hourAngle,
    clockRadius*0.42,
    7,
    `rgba(255,220,160,${0.95*clockAlpha})`
);
/////////////////////////////////////////////////////////
// 分针
/////////////////////////////////////////////////////////

drawHand(
    minAngle,
    clockRadius*0.62,
    4,
    // "rgba(180,220,255,0.95)"
    `rgba(180,220,255,${0.95*clockAlpha})`
);

/////////////////////////////////////////////////////////
// 秒针
/////////////////////////////////////////////////////////

drawHand(
    secAngle,
    clockRadius*0.74,
    2,
    // "rgba(255,120,120,0.95)"
    `rgba(255,120,120,${0.95*clockAlpha})`
);

/////////////////////////////////////////////////////////
// 中心
/////////////////////////////////////////////////////////

const centerGlow =
    ctx.createRadialGradient(
        0,0,0,
        0,0,
        18
    );

centerGlow.addColorStop(
    0,
    // "rgba(255,255,255,1)"
    `rgba(255,255,255,${clockAlpha})`
);

centerGlow.addColorStop(
    1,
    "rgba(255,255,255,0)"
);

ctx.fillStyle =
    centerGlow;

ctx.beginPath();

ctx.arc(
    0,
    0,
    18,
    0,
    Math.PI*2
);

ctx.fill();

/////////////////////////////////////////////////////////
// 幽灵残影
/////////////////////////////////////////////////////////

ctx.beginPath();

ctx.strokeStyle =
    `rgba(120,180,255,${0.08*clockAlpha})`;

ctx.lineWidth = 18;

ctx.arc(
    0,
    0,
    clockRadius+4,
    0,
    Math.PI*2
);

ctx.restore();
    const vignette =
        ctx.createRadialGradient(
            cx,cy,
            Math.min(w,h)*0.2,

            cx,cy,
            Math.max(w,h)*0.8
        );

    vignette.addColorStop(
        0,
        "rgba(0,0,0,0)"
    );

    vignette.addColorStop(
        1,
        "rgba(0,0,0,0.72)"
    );

    ctx.fillStyle = vignette;

    ctx.fillRect(0,0,w,h);

    requestAnimationFrame(draw);
}

requestAnimationFrame(draw);
