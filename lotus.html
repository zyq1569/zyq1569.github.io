    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
        }

        canvas,
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            object-fit: cover;
            z-index: -1;
        }

        video {
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            /* 视频淡入 */
        }

        .clock-container {
            position: absolute;
            border-radius: 50%;
            z-index: 10;
        }

        .clock-btn {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            color: #000;
            background-color: rgba(255, 200, 200, 0.8);
            border: 2px solid #333;
            text-align: center;
        }

        .clock-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }
    </style>
</head>

<body>

    <canvas id="scrollCanvas"></canvas>
    <video id="bgVideo" autoplay muted loop playsinline webkit-playsinline></video>
    <div class="clock-container" id="clock"></div>

    <script>
        // -----------------------------
        // 配置
        // -----------------------------
        const canvas = document.getElementById('scrollCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('bgVideo');

        const jpgSrc = "./pic/lotus.jpg"; // 替换为你的 JPG 图片
        const mp4Src = "./pic/lotus.mp4"; // 替换为你的 JPG 图片

        const direction = 'none';  // 背景滚动方向
        const scrollSpeed = 0.3;   // 背景滚动速度
        const effect = 'wave';      // 'none' 或 'wave'

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // -----------------------------
        // JPG 背景滚动 + 波纹
        // -----------------------------
        const img = new Image();
        img.src = jpgSrc;

        let offsetX = 0;
        let offsetY = 0;
        let waveTime = 0;

        function drawJPGBackground() {
            ctx.clearRect(0, 0, width, height);
            const imgWidth = width;
            const imgHeight = height;

            if (direction === 'left') { offsetX -= scrollSpeed; if (offsetX <= -imgWidth) offsetX += imgWidth; }
            else if (direction === 'right') { offsetX += scrollSpeed; if (offsetX >= imgWidth) offsetX -= imgWidth; }
            else if (direction === 'up') { offsetY -= scrollSpeed; if (offsetY <= -imgHeight) offsetY += imgHeight; }
            else if (direction === 'down') { offsetY += scrollSpeed; if (offsetY >= imgHeight) offsetY -= imgHeight; }

            if (effect === 'wave') {
                const amplitude = 5;
                const wavelength = 100;
                waveTime += 0.05;

                const offCanvas = document.createElement('canvas');
                offCanvas.width = width;
                offCanvas.height = height;
                const offCtx = offCanvas.getContext('2d');

                if (direction === 'left' || direction === 'right') {
                    offCtx.drawImage(img, offsetX, 0, imgWidth, imgHeight);
                    offCtx.drawImage(img, offsetX + imgWidth, 0, imgWidth, imgHeight);
                } else {
                    offCtx.drawImage(img, 0, offsetY, imgWidth, imgHeight);
                    offCtx.drawImage(img, 0, offsetY + imgHeight, imgWidth, imgHeight);
                }

                const imageData = offCtx.getImageData(0, 0, width, height);
                const data = imageData.data;
                const tempData = new Uint8ClampedArray(data);

                for (let y = 0; y < height; y++) {
                    const shift = Math.sin((y / wavelength) + waveTime) * amplitude;
                    for (let x = 0; x < width; x++) {
                        let newX = Math.floor(x + shift);
                        if (newX < 0) newX += width;
                        if (newX >= width) newX -= width;
                        const idx = (y * width + x) * 4;
                        const newIdx = (y * width + newX) * 4;
                        data[idx] = tempData[newIdx];
                        data[idx + 1] = tempData[newIdx + 1];
                        data[idx + 2] = tempData[newIdx + 2];
                        data[idx + 3] = tempData[newIdx + 3];
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            } else {
                if (direction === 'left') {
                    ctx.drawImage(img, offsetX, 0, imgWidth, imgHeight);
                    ctx.drawImage(img, offsetX + imgWidth, 0, imgWidth, imgHeight);
                } else if (direction === 'right') {
                    ctx.drawImage(img, offsetX, 0, imgWidth, imgHeight);
                    ctx.drawImage(img, offsetX - imgWidth, 0, imgWidth, imgHeight);
                } else if (direction === 'up') {
                    ctx.drawImage(img, 0, offsetY, imgWidth, imgHeight);
                    ctx.drawImage(img, 0, offsetY + imgHeight, imgWidth, imgHeight);
                } else if (direction === 'down') {
                    ctx.drawImage(img, 0, offsetY, imgWidth, imgHeight);
                    ctx.drawImage(img, 0, offsetY - imgHeight, imgWidth, imgHeight);
                }
            }

            requestAnimationFrame(drawJPGBackground);
        }

        img.onload = () => { drawJPGBackground(); };

        // -----------------------------

        // -----------------------------
        // 时钟按钮
        // -----------------------------
        const clockContainer = document.getElementById('clock');
        const btnConfig = [
            { text: "舞蹈", link: "https://zyq1569.github.io/dance" },
            { text: "音樂", link: "https://zyq1569.github.io/music" },
            { text: "名著", link: "https://zyq1569.github.io/hope/books" },
            { text: "百科", link: "https://zyq1569.github.io/hope/new" },
            { text: "感悟", link: "https://zyq1569.github.io/hope/new" },
            { text: "奇聞", link: "https://zyq1569.github.io/hope/papers" },
            { text: "UFO", link: "https://zyq1569.github.io/hope/new" },
            { text: "奇書", link: "https://zyq1569.github.io/hope/new" },
            { text: "歷史", link: "https://zyq1569.github.io/hope/new" },
            { text: "美食", link: "https://zyq1569.github.io/hope/new" },
            { text: "紅塵", link: "https://zyq1569.github.io/hope/new" },
            { text: "主页", link: "https://zyq1569.github.io" },
        ];

        const btnCount = btnConfig.length;
        const btnSizePercent = 0.08;
        const radiusPercent = 0.35;

        function renderClock() {
            clockContainer.innerHTML = '';
            width = window.innerWidth;
            height = window.innerHeight;
            const minSize = Math.min(width, height);
            const radius = minSize * radiusPercent;
            const btnSize = minSize * btnSizePercent;
            const clockSize = 2 * radius + btnSize;

            clockContainer.style.width = clockSize + 'px';
            clockContainer.style.height = clockSize + 'px';
            clockContainer.style.left = `${(width - clockSize) / 2}px`;
            clockContainer.style.top = `${(height - clockSize) / 2}px`;


            for (let i = 0; i < btnCount; i++) {
                const config = btnConfig[i];
                const btn = document.createElement('a');
                btn.className = 'clock-btn';
                btn.innerText = config.text;
                btn.href = config.link;
                btn.target = '_blank';
                btn.style.width = btnSize + 'px';
                btn.style.height = btnSize + 'px';
                btn.style.borderRadius = btnSize / 2 + 'px';
                // -----------------------------
                // 新增：字体自适应
                const fontSize = btnSize * 0.35; // 字体大小按按钮比例
                btn.style.fontSize = fontSize + 'px';
                btn.style.lineHeight = btnSize + 'px'; // 让文字垂直居中
                const angle = (i - 3) * (360 / btnCount);
                const rad = angle * Math.PI / 180;
                const center = clockSize / 2;
                const x = center + radius * Math.cos(rad) - btnSize / 2;
                const y = center + radius * Math.sin(rad) - btnSize / 2;
                btn.style.left = `${x}px`;
                btn.style.top = `${y}px`;
                clockContainer.appendChild(btn);
            }
        }

        renderClock();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderClock();
        });
    </script>
