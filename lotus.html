<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Null2Live</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            position: relative;
            font-family: sans-serif;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        .clock-container {
            position: absolute;
            border-radius: 50%;
        }

        .clock-btn {
            position: absolute;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            text-decoration: none;
            color: #000;
            background-color: rgba(255, 200, 200, 0.8);
            border: 2px solid #333;
            text-align: center;
        }

        .clock-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }
    </style>
</head>

<body>
    <canvas id="scrollCanvas"></canvas>
    <div class="clock-container" id="clock"></div>

    <script>
        // -----------------------
        // 背景配置
        // -----------------------
        const canvas = document.getElementById("scrollCanvas");
        const ctx = canvas.getContext("2d");

        const img = new Image();
        img.src = "./pic/lotus.jpg"; // 替换为你的 JPG 图片

        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        // -----------------------
        // 滚动与效果控制
        // -----------------------
        const direction = "none"; // 'left'/'right'/'up'/'down'
        const scrollSpeed = 0.3; // 像素/帧
        const effect = "wave"; // 'none' 普通滚动 / 'wave' 波纹效果

        let offsetX = 0;
        let offsetY = 0;
        let waveTime = 0;

        function drawBackground() {
            ctx.clearRect(0, 0, width, height);
            const imgWidth = width;
            const imgHeight = height;

            // -----------------------
            // 更新偏移
            // -----------------------
            if (direction === "left") {
                offsetX -= scrollSpeed;
                if (offsetX <= -imgWidth) offsetX += imgWidth;
            } else if (direction === "right") {
                offsetX += scrollSpeed;
                if (offsetX >= imgWidth) offsetX -= imgWidth;
            } else if (direction === "up") {
                offsetY -= scrollSpeed;
                if (offsetY <= -imgHeight) offsetY += imgHeight;
            } else if (direction === "down") {
                offsetY += scrollSpeed;
                if (offsetY >= imgHeight) offsetY -= imgHeight;
            }

            // -----------------------
            // 绘制带波纹效果
            // -----------------------
            if (effect === "wave") {
                const amplitude = 5; // 波幅像素
                const wavelength = 100; // 波长
                waveTime += 0.05;

                // 创建离屏 Canvas
                const offCanvas = document.createElement("canvas");
                offCanvas.width = width;
                offCanvas.height = height;
                const offCtx = offCanvas.getContext("2d");

                // 先画普通滚动背景
                if (direction === "left" || direction === "right") {
                    offCtx.drawImage(img, offsetX, 0, imgWidth, imgHeight);
                    offCtx.drawImage(img, offsetX + imgWidth, 0, imgWidth, imgHeight);
                } else {
                    offCtx.drawImage(img, 0, offsetY, imgWidth, imgHeight);
                    offCtx.drawImage(img, 0, offsetY + imgHeight, imgWidth, imgHeight);
                }

                // 波纹处理
                const imageData = offCtx.getImageData(0, 0, width, height);
                const data = imageData.data;
                const tempData = new Uint8ClampedArray(data);

                for (let y = 0; y < height; y++) {
                    const shift = Math.sin(y / wavelength + waveTime) * amplitude;
                    for (let x = 0; x < width; x++) {
                        let newX = Math.floor(x + shift);
                        if (newX < 0) newX += width;
                        if (newX >= width) newX -= width;
                        const idx = (y * width + x) * 4;
                        const newIdx = (y * width + newX) * 4;
                        data[idx] = tempData[newIdx];
                        data[idx + 1] = tempData[newIdx + 1];
                        data[idx + 2] = tempData[newIdx + 2];
                        data[idx + 3] = tempData[newIdx + 3];
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            } else {
                // 普通滚动
                if (direction === "left") {
                    ctx.drawImage(img, offsetX, 0, imgWidth, imgHeight);
                    ctx.drawImage(img, offsetX + imgWidth, 0, imgWidth, imgHeight);
                } else if (direction === "right") {
                    ctx.drawImage(img, offsetX, 0, imgWidth, imgHeight);
                    ctx.drawImage(img, offsetX - imgWidth, 0, imgWidth, imgHeight);
                } else if (direction === "up") {
                    ctx.drawImage(img, 0, offsetY, imgWidth, imgHeight);
                    ctx.drawImage(img, 0, offsetY + imgHeight, imgWidth, imgHeight);
                } else if (direction === "down") {
                    ctx.drawImage(img, 0, offsetY, imgWidth, imgHeight);
                    ctx.drawImage(img, 0, offsetY - imgHeight, imgWidth, imgHeight);
                }
            }

            requestAnimationFrame(drawBackground);
        }

        img.onload = () => {
            drawBackground();
        };

        // -----------------------
        // 时钟按钮
        // -----------------------
        const clockContainer = document.getElementById("clock");
        const btnConfig = [
            { text: "1", link: "https://zyq1569.github.io/" },
            { text: "2", link: "https://zyq1569.github.io/" },
            { text: "3", link: "https://zyq1569.github.io/" },
            { text: "4", link: "https://zyq1569.github.io/" },
            { text: "5", link: "https://zyq1569.github.io/" },
            { text: "6", link: "https://zyq1569.github.io/" },
            { text: "7", link: "https://zyq1569.github.io/" },
            { text: "8", link: "https://zyq1569.github.io/" },
            { text: "9", link: "https://zyq1569.github.io/" },
            { text: "10", link: "https://zyq1569.github.io/" },
            { text: "11", link: "https://zyq1569.github.io/" },
            { text: "12", link: "https://zyq1569.github.io/" },
        ];

        const btnCount = btnConfig.length;
        const btnSizePercent = 0.08;
        const radiusPercent = 0.35;

        function renderClock() {
            clockContainer.innerHTML = "";
            width = window.innerWidth;
            height = window.innerHeight;
            const minSize = Math.min(width, height);
            const radius = minSize * radiusPercent;
            const btnSize = minSize * btnSizePercent;
            const clockSize = 2 * radius + btnSize;

            clockContainer.style.width = clockSize + "px";
            clockContainer.style.height = clockSize + "px";
            clockContainer.style.left = `${(width - clockSize) / 2}px`;
            clockContainer.style.top = `${(height - clockSize) / 2}px`;

            for (let i = 0; i < btnCount; i++) {
                const config = btnConfig[i];
                const btn = document.createElement("a");
                btn.className = "clock-btn";
                btn.innerText = config.text;
                btn.href = config.link;
                btn.target = "_blank";

                btn.style.width = btnSize + "px";
                btn.style.height = btnSize + "px";
                btn.style.borderRadius = btnSize / 2 + "px";

                const angle = (i - 3) * (360 / btnCount);
                const rad = (angle * Math.PI) / 180;
                const center = clockSize / 2;
                const x = center + radius * Math.cos(rad) - btnSize / 2;
                const y = center + radius * Math.sin(rad) - btnSize / 2;

                btn.style.left = `${x}px`;
                btn.style.top = `${y}px`;

                clockContainer.appendChild(btn);
            }
        }

        renderClock();
        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderClock();
        });
    </script>
</body>

</html>
