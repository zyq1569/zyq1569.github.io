<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOOKS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", sans-serif;
            color: white;
        }

        /* ========================= */
        /* 天堂背景 */
        /* ========================= */
        .bg {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.38)),
                url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop");
            /* url("https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop"); */

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: bgZoom 18s ease-in-out infinite alternate;
            z-index: -5;
        }

        @keyframes bgZoom {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.04);
            }
        }

        /* ========================= */
        /* 呼吸星星 */
        /* ========================= */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -3;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: breath 3s infinite ease-in-out;
        }

        @keyframes breath {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(2);
            }
        }

        /* ========================= */
        /* 主布局 */
        /* ========================= */
        .layout {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* ========================= */
        /* 左側導航 */
        /* ========================= */
        .sidebar {
            width: 230px;
            min-width: 230px;
            height: 100vh;
            padding: 20px 14px;

            /* 完全透明 */
            background: transparent;

            overflow-y: auto;
        }

        .sidebar h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 18px;
            color: #ffe8aa;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }

        /* 書籍列表 */
        .book-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .book-list a {
            display: block;
            text-decoration: none;
            color: white;

            /* 沒有邊框、沒有背景 */
            background: transparent;
            border: none;

            padding: 8px 4px;

            font-size: 15px;

            transition: 0.25s;
        }

        .book-list a:hover {
            transform: translateX(5px);
            color: #ffe8aa;
        }

        /* ========================= */
        /* 中央內容 */
        /* ========================= */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .content-box {
            width: min(410px, 100%);
            background: rgba(255, 255, 255, 0);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 42px 36px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0);
        }

        .content-box h2 {
            font-size: 48px;
            margin-bottom: 18px;
        }

        .content-box p {
            font-size: 20px;
            line-height: 1.8;
        }

        /* .holy-line {
            border: none;
            height: 1px;
            width: 80%;
            margin: 10px auto;
            background: linear-gradient(to right,
                    transparent,
                    rgba(255, 255, 255, 0.8),
                    transparent);
            box-shadow:
                0 0 10px rgba(255, 255, 255, 0.4);
        } */
        /* -------------------------======================== */
        /* 神聖分割線容器 */

        .holy-wrapper {

            position: relative;

            width: 80%;

            margin: 10px auto;

            height: 10px;

            display: flex;
            justify-content: center;
            align-items: center;

            overflow: hidden;
        }

        /* ========================= */
        /* 金色聖光主線 */
        /* ========================= */
        .holy-line {

            position: relative;

            width: 100%;
            height: 2px;

            border-radius: 999px;

            background:
                linear-gradient(to right,
                    transparent,
                    rgba(255, 230, 150, 0.2),
                    rgba(255, 240, 180, 1),
                    rgba(255, 220, 120, 0.9),
                    rgba(255, 240, 180, 1),
                    rgba(255, 230, 150, 0.2),
                    transparent);

            box-shadow:
                0 0 8px rgba(255, 220, 120, 0.5),
                0 0 20px rgba(255, 210, 100, 0.4),
                0 0 40px rgba(255, 190, 80, 0.25);

            animation:
                holyBreath 4s ease-in-out infinite;
        }

        /* ========================= */
        /* 左右流光 */
        /* ========================= */
        .holy-line::before {

            content: "";

            position: absolute;

            top: -4px;
            left: -20%;

            width: 20%;
            height: 10px;

            background:
                linear-gradient(to right,
                    transparent,
                    rgba(255, 255, 255, 0.95),
                    transparent);

            filter: blur(4px);

            animation: flowLight 3s linear infinite;
        }

        /* 流光動畫 */
        @keyframes flowLight {

            0% {
                left: -25%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                left: 120%;
                opacity: 0;
            }
        }

        /* ========================= */
        /* 呼吸聖光 */
        /* ========================= */
        @keyframes holyBreath {

            0%,
            100% {

                opacity: 0.55;

                transform: scaleX(0.96);

                box-shadow:
                    0 0 6px rgba(255, 220, 120, 0.3),
                    0 0 14px rgba(255, 210, 100, 0.25),
                    0 0 28px rgba(255, 190, 80, 0.15);
            }

            50% {

                opacity: 1;

                transform: scaleX(1);

                box-shadow:
                    0 0 12px rgba(255, 230, 150, 0.8),
                    0 0 30px rgba(255, 220, 120, 0.6),
                    0 0 55px rgba(255, 190, 80, 0.35);
            }
        }

        /* ========================= */
        /* 神聖粒子 */
        /* ========================= */
        .particle {

            position: absolute;

            width: 4px;
            height: 4px;

            border-radius: 50%;

            background: rgba(255, 240, 180, 0.95);

            box-shadow:
                0 0 8px rgba(255, 240, 180, 0.8),
                0 0 18px rgba(255, 220, 120, 0.6);

            animation: floatParticle linear infinite;
        }

        /* 每個粒子不同位置 */
        .p1 {
            left: 12%;
            animation-duration: 4s;
            animation-delay: 0s;
        }

        .p2 {
            left: 35%;
            animation-duration: 5s;
            animation-delay: 1s;
        }

        .p3 {
            left: 62%;
            animation-duration: 4.5s;
            animation-delay: 2s;
        }

        .p4 {
            left: 82%;
            animation-duration: 5.5s;
            animation-delay: 0.5s;
        }

        /* 粒子漂浮 */
        @keyframes floatParticle {

            0% {

                transform:
                    translateY(12px) scale(0.6);

                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            80% {
                opacity: 1;
            }

            100% {

                transform:
                    translateY(-16px) scale(1.4);

                opacity: 0;
            }
        }

        /* ========================= */
        /* 手機端 */
        /* ========================= */
        @media (max-width:768px) {

            .holy-wrapper {

                width: 88%;

                margin: 36px auto;

                height: 30px;
            }

            .holy-line {
                height: 1.5px;
            }

            .particle {

                width: 3px;
                height: 3px;
            }
        }

        /* -----------------------------========================= -----------------------------*/
        /* ========================= */
        /* 手機端適配 */
        /* ========================= */
        @media (max-width: 768px) {

            html,
            body {
                overflow: auto;
            }

            .layout {
                height: auto;
                min-height: 100vh;
            }

            /* 保持和桌面一樣的豎向導航 */
            .sidebar {
                width: 110px;
                min-width: 110px;

                padding: 12px 8px;
            }

            .sidebar h1 {
                font-size: 15px;
                margin-bottom: 12px;
            }

            /* 手機字體自動縮小 */
            .book-list {
                gap: 8px;
            }

            .book-list a {
                font-size: 11px;
                padding: 4px 2px;
            }

            /* 中央內容 */
            .content {
                padding: 18px 14px;
            }

            .content-box {
                padding: 24px 18px;
                border-radius: 18px;
            }

            .content-box h2 {
                font-size: 26px;
                line-height: 1.3;
                margin-bottom: 12px;
            }

            .content-box p {
                font-size: 14px;
                line-height: 1.7;
            }
        }
    </style>
</head>

<body>


    <!-- 背景 shitaotv-------@gmail.com -->
