<!doctype html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOOKS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", sans-serif;
            color: white;
        }

        /* ========================= */
        /* 天堂背景 */
        /* ========================= */
        .bg {
            position: fixed;
            inset: 0;
            background:
                linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.38)),
                url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop");
            /* url("https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop"); */

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            animation: bgZoom 18s ease-in-out infinite alternate;
            z-index: -5;
        }

        @keyframes bgZoom {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.04);
            }
        }

        /* ========================= */
        /* 呼吸星星 */
        /* ========================= */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -3;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white;
            animation: breath 3s infinite ease-in-out;
        }

        @keyframes breath {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(2);
            }
        }

        /* ========================= */
        /* 主布局 */
        /* ========================= */
        .layout {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* ========================= */
        /* 左側導航 */
        /* ========================= */
        .sidebar {
            width: 230px;
            min-width: 230px;
            height: 100vh;
            padding: 20px 14px;

            /* 完全透明 */
            background: transparent;

            overflow-y: auto;
        }

        .sidebar h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 18px;
            color: #ffe8aa;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }

        /* 書籍列表 */
        .book-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .book-list a {
            display: block;
            text-decoration: none;
            color: white;

            /* 沒有邊框、沒有背景 */
            background: transparent;
            border: none;

            padding: 8px 4px;

            font-size: 15px;

            transition: 0.25s;
        }

        .book-list a:hover {
            transform: translateX(5px);
            color: #ffe8aa;
        }

        /* ========================= */
        /* 中央內容 */
        /* ========================= */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .content-box {
            width: min(400px, 100%);
            background: rgba(255, 255, 255, 0);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 42px 36px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0);
        }

        .content-box h2 {
            font-size: 48px;
            margin-bottom: 18px;
        }

        .content-box p {
            font-size: 20px;
            line-height: 1.8;
        }

        /* ========================= */
        /* 手機端適配 */
        /* ========================= */
        @media (max-width: 768px) {

            html,
            body {
                overflow: auto;
            }

            .layout {
                height: auto;
                min-height: 100vh;
            }

            /* 保持和桌面一樣的豎向導航 */
            .sidebar {
                width: 120px;
                min-width: 120px;

                padding: 12px 8px;
            }

            .sidebar h1 {
                font-size: 15px;
                margin-bottom: 12px;
            }

            /* 手機字體自動縮小 */
            .book-list {
                gap: 8px;
            }

            .book-list a {
                font-size: 11px;
                padding: 4px 2px;
            }

            /* 中央內容 */
            .content {
                padding: 18px 14px;
            }

            .content-box {
                padding: 24px 18px;
                border-radius: 18px;
            }

            .content-box h2 {
                font-size: 26px;
                line-height: 1.3;
                margin-bottom: 12px;
            }

            .content-box p {
                font-size: 14px;
                line-height: 1.7;
            }
        }
    </style>
</head>

<body>
    <!-- 背景 shitaotv-------@gmail.com -->
    <div class="bg"></div>

    <!-- 星星 -->
    <div class="stars">
        <div class="star" style="top: 10%; left: 20%; animation-delay: 0s"></div>
        <div class="star" style="top: 18%; left: 80%; animation-delay: 1s"></div>
        <div class="star" style="top: 34%; left: 60%; animation-delay: 2s"></div>
        <div class="star" style="top: 50%; left: 25%; animation-delay: 1.5s"></div>
        <div class="star" style="top: 70%; left: 75%; animation-delay: 2.5s"></div>
        <div class="star" style="top: 85%; left: 40%; animation-delay: 0.8s"></div>
    </div>

    <div class="layout">
        <!-- 左側導航 -->
        <aside class="sidebar">
            <h1>☁ 書.明.名著</h1>

            <ul class="book-list">
                <li><a href="https://ctext.org/fengshen-yanyi/zh">📖封神演義</a></li>
                <li><a href="https://ctext.org/xiyouji/zh">📖西遊記</a></li>
                <li><a href="https://ctext.org/wiki.pl?if=gb&chapter=36344">📖圍爐夜話</a>
                <li><a href="https://ctext.org/kangxi-zidian/zh">📖康熙字典</a>
                </li>
                <li>
                    <a href="https://mysoundwise.com/soundcasts/1583368037532s">📖封神演義.推薦</a>
                </li>
                <li>
                    <a href="https://www.ganjingworld.com/playlist/1hqjpmbsoqo5QQu4cGzfGc211c0p">📖封神演義.推薦</a>
                </li>
                <li>
                    <a href="https://www.ganjingworld.com/playlist/1h2dvmj4a235d8CkZGs3g931h00p">📖西遊記.推薦</a>
                </li>
                <!-- https://www.gushiwen.cn/ -->
            </ul>
        </aside>

        <!-- 中央內容 -->
        <main class="content">
            <div class="content-box">
                <h2>✨Heaven✨</h2>
                <p>
                    紅塵可怕名利情.因果報應陷輪迴<br />
                    苦在迷中身不知.返本歸真唯正途<br />
                                  人生本是西遊記<br />
                    一體真如轉落塵.合和四相復修身<br />
                    五行論色空還寂.百怪虛名總莫論<br />
                    正果旃檀歸大覺.完成品職脫沉淪<br />
                    經傳天下恩光闊.五聖高居不二門<br />
                </p>
            </div>
        </main>
    </div>
</body>

</html>
