<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>COMING FOR YOU</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family:
                "Segoe UI",
                "PingFang TC",
                sans-serif;
        }

        /* ========================= */
        /* 動態背景 */
        /* ========================= */
        .bg {
            position: fixed;
            inset: 0;

            background:
                linear-gradient(rgba(0, 0, 0, 0.18),
                    rgba(0, 0, 0, 0.35)),
                url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            animation: bgMove 20s ease-in-out infinite alternate;

            z-index: -5;
        }

        @keyframes bgMove {

            0% {
                transform: scale(1);
                filter: brightness(0.95);
            }

            100% {
                transform: scale(1.08);
                filter: brightness(1.08);
            }
        }

        /* ========================= */
        /* 呼吸星星 */
        /* ========================= */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -3;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;

            box-shadow:
                0 0 8px white,
                0 0 18px white;

            animation: starBreath 3s infinite ease-in-out;
        }

        @keyframes starBreath {

            0%,
            100% {
                opacity: 0.2;
                transform: scale(0.7);
            }

            50% {
                opacity: 1;
                transform: scale(2);
            }
        }

        /* ========================= */
        /* 主容器 */
        /* ========================= */
        .container {
            width: 100%;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
        }

        /* ========================= */
        /* 內容區 */
        /* ========================= */
        .content {

            text-align: center;

            /* 邊框最小化 */
            border: 1px solid rgba(255, 255, 255, 0.04);

            /* 更透明 */
            background: rgba(255, 255, 255, 0.025);

            backdrop-filter: blur(4px);

            border-radius: 26px;

            padding: 60px 70px;

            box-shadow:
                0 0 20px rgba(255, 255, 255, 0.04);
        }

        /* ========================= */
        /* 發光主標題 */
        /* ========================= */
        .content h1 {

            position: relative;

            font-size: 82px;

            font-weight: 800;

            letter-spacing: 10px;

            color: white;

            margin-bottom: 28px;

            /* 太陽光感 */
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.9),
                0 0 18px rgba(255, 255, 255, 0.8),
                0 0 35px rgba(255, 220, 120, 0.7),
                0 0 60px rgba(255, 200, 80, 0.5),
                0 0 90px rgba(255, 180, 50, 0.35);

            animation:
                glowPulse 4s ease-in-out infinite,
                floatLight 6s ease-in-out infinite;
        }

        /* 光線呼吸 */
        @keyframes glowPulse {

            0%,
            100% {

                text-shadow:
                    0 0 6px rgba(255, 255, 255, 0.7),
                    0 0 15px rgba(255, 255, 255, 0.7),
                    0 0 30px rgba(255, 220, 120, 0.5),
                    0 0 55px rgba(255, 190, 80, 0.35),
                    0 0 80px rgba(255, 160, 40, 0.2);
            }

            50% {

                text-shadow:
                    0 0 10px rgba(255, 255, 255, 1),
                    0 0 22px rgba(255, 255, 255, 0.95),
                    0 0 45px rgba(255, 230, 140, 0.95),
                    0 0 80px rgba(255, 210, 100, 0.7),
                    0 0 120px rgba(255, 180, 60, 0.45);
            }
        }

        /* 微浮動 */
        @keyframes floatLight {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-4px);
            }
        }

        /* ========================= */
        /* 副文字 */
        /* ========================= */
        .content p {

            color: rgba(255, 255, 255, 0.88);

            font-size: 22px;

            line-height: 1.9;

            letter-spacing: 2px;

            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.15);
        }

        /* ========================= */
        /* 手機端適配 */
        /* ========================= */
        @media (max-width:768px) {

            .content {

                width: 100%;

                padding: 36px 24px;

                border-radius: 20px;
            }

            .content h1 {

                font-size: 42px;

                line-height: 1.3;

                letter-spacing: 4px;

                margin-bottom: 18px;
            }

            .content p {

                font-size: 15px;

                line-height: 1.8;
            }
        }
    </style>
</head>

<body>

    <!-- 背景 -->
    <div class="bg"></div>

    <!-- 星星 -->
    <div class="stars">

        <div class="star" style="top:10%;left:18%;animation-delay:0s;"></div>

        <div class="star" style="top:22%;left:75%;animation-delay:1s;"></div>

        <div class="star" style="top:38%;left:60%;animation-delay:2s;"></div>

        <div class="star" style="top:50%;left:25%;animation-delay:1.4s;"></div>

        <div class="star" style="top:68%;left:80%;animation-delay:2.2s;"></div>

        <div class="star" style="top:82%;left:42%;animation-delay:0.8s;"></div>

        <div class="star" style="top:30%;left:12%;animation-delay:1.6s;"></div>

        <div class="star" style="top:72%;left:58%;animation-delay:2.8s;"></div>

    </div>

    <!-- 主內容 -->
    <div class="container">

        <div class="content">

            <h1>COMING FOR YOU</h1>

            <p>
                本頁面正在建設中<br>
                敬請等待 · STAY TUNED
                <li><a href="https://zyq1569.github.io/">🏠　HOME　🏠</a></li>
            </p>

        </div>

    </div>
    <script>
        window.goatcounter = {
            path: location.pathname || '/',
        }
    </script>
    <script data-goatcounter="https://bitterlive.goatcounter.com/count" async src="./JS/count.js">
    </script>
</body>

</html>
