<!doctype html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tec.</title>

  <style>
    /* =========================
   GLOBAL
========================= */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, Arial;
      color: white;
      overflow-x: hidden;
    }

    /* =========================
   BACKGROUND
========================= */
    #bg {
      position: fixed;
      inset: 0;
      background: url("./pic/tech.jfif") center/cover no-repeat;
      filter: brightness(0.55);
      z-index: -3;
    }

    /* stars */
    #stars {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.3;
      animation: breathe 3s infinite ease-in-out;
    }

    @keyframes breathe {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.2;
      }

      50% {
        transform: scale(2);
        opacity: 1;
      }
    }

    /* =========================
   TOP BAR
========================= */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(14px);
      background: rgba(0, 0, 0, 0.35);
      padding: 7px;
      display: flex;
      flex-wrap: nowrap;
      gap: 1px;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }

    header::-webkit-scrollbar {
      display: none;
    }

    input,
    select {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }

    /* 下拉选项颜色（关键修改） */
    select option {
      color: black;
      /* 字体颜色 */
      background: white;
      /* 背景颜色（可选） */
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
    }


    /* =========================
   LAYOUT
========================= */
    /* =========================
   GOLDEN GRID LAYOUT
========================= */
    #app {
      padding: 20px;

      /* 更高级网格：控制密度 */
      display: grid;

      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));

      gap: 14px;

      /* 对齐节奏（关键） */
      align-items: start;
    }

    /* =========================
   GOLDEN RATIO CARD
========================= */
    .card {
      /* 黄金比例关键 */
      aspect-ratio: 1 / 0.618;

      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);

      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;

      padding: 12px;

      cursor: pointer;

      transition: 0.25s ease;

      /* 内容溢出控制 */
      overflow: hidden;

      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* hover 提升层级 */
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    /* 标题压缩 */
    .card h3 {
      font-size: 14px;
      margin: 0;
    }

    /* summary 更紧凑 */
    .card p {
      font-size: 12px;
      opacity: 0.8;
      margin: 6px 0 0;
      line-height: 1.4;
    }

    /* 分类标签更轻 */
    .card small {
      opacity: 0.5;
      font-size: 11px;
    }

    .text-block {
      text-indent: 4ch;
      /* = 4个字符宽度 */
      line-height: 1.7;
    }

    .subtitle-block {
      font-weight: 700;
      font-size: 16px;
      margin: 18px 0 8px;
    }

    @media (min-width: 769px) {

      #detail {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 10.1%;
        /* 0.191 ≈ 黄金比例 1 - 0.618 */
      }

    }

    /* =========================
   MOBILE OPTIMIZATION
========================= */
    @media (max-width: 768px) {
      #app {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .card {
        aspect-ratio: 1 / 0.7;
      }
    }

    @media (max-width: 420px) {
      #app {
        grid-template-columns: 1fr;
      }
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card h3 {
      margin: 0 0 6px;
    }

    /* =========================
   DETAIL PAGE
========================= */
    #detail {
      display: none;
      padding: 20px;
    }

    .block {
      margin: 14px 0;
      line-height: 1.6;
    }

    img,
    video {
      width: 100%;
      border-radius: 12px;
    }

    a {
      color: #8fd3ff;
    }

    .home,
    .back,
    .nav-btn {

      height: 40px;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 0 10px;

      white-space: nowrap;
      /* ⭐ 禁止文字换行 */

      flex-shrink: 0;
      /* ⭐ 禁止被压缩 */

      border-radius: 10px;
      border: none;

      background: rgba(255, 255, 255, .15);
      color: white;

      cursor: pointer;
    }

    #detail h1 {
      text-align: center;
      margin: 20px 0;
    }

    /* =========================
   RESPONSIVE
========================= */
    @media (max-width: 768px) {
      #app {
        grid-template-columns: 1fr;
      }
    }

    /* =========================
   MEDIA GROUP BASE
========================= */
    .media-group {
      width: 100%;
    }


    /* =========================
   ROW MODE（强制一行）
========================= */
    .media-container.row {
      grid-auto-flow: column;
      grid-auto-columns: 160px;
      overflow-x: auto;
    }

    /* =========================
   MEDIA ITEM
========================= */
    .media-item img,
    .media-item video {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    /* =========================
   WRAP CONTROL
========================= */
    .media-group.nowrap .media-container.row {
      overflow-x: auto;
      white-space: nowrap;
    }

    .media-group.wrap .media-container.grid {
      overflow: visible;
    }


    /* =========================
   SMART MEDIA ENGINE
========================= */

    /* 单图 */
    .single-media {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .single-media img,
    .single-media video {
      display: block;
    }

    /* 桌面端 */
    @media (min-width: 769px) {

      .single-media img,
      .single-media video {
        width: 90.%;
        max-width: 2000px;
        height: auto;
      }
    }

    /* 手机端保持原样 */
    @media (max-width: 768px) {

      .single-media img,
      .single-media video {
        width: 100%;
      }
    }

    /* =========================
   MULTI MEDIA ENGINE
========================= */
    .media-container {
      width: 100%;
      gap: 12px;
    }

    /* 单图 */
    .media-container.column {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .media-container.column .media-item {
      width: 66.7%;
      max-width: 900px;
    }

    /* 多图 */
    .media-container.grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    /* 防止图片把 Grid 撑坏 */
    .media-item {
      min-width: 0;
      overflow: hidden;
    }

    .media-item img,
    .media-item video {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    /* =========================
   MOBILE MEDIA FIX
========================= */

    @media (max-width: 768px) {

      /* 单图 */
      .single-media img,
      .single-media video {
        width: 100% !important;
        max-width: none;
      }

      /* media-group 单图 */
      .media-container.column .media-item {
        width: 100% !important;
        max-width: none;
      }

      /* 多图 */
      .media-container.grid {
        display: grid;

        grid-template-columns:
          repeat(2, minmax(0, 1fr));

        gap: 8px;
      }

      .media-item {
        width: 100% !important;
        min-width: 0;
      }

      .media-item img,
      .media-item video {
        width: 100%;
        height: auto;
        display: block;
      }
    }


    @media (max-width: 768px) {

      .home,
      .back,
      .nav-btn {

        height: 34px;

        padding: 0 8px;

        font-size: 13px;
      }

      input,
      select {

        min-width: 70px;

        font-size: 13px;

        padding: 8px;
      }
    }


    .code-block {
      margin: 14px 0;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .code-block pre {
      margin: 0;
      padding: 14px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .code-block code {
      color: #e6e6e6;
      white-space: pre;
    }

    .code-block::before {
      content: attr(data-lang);
      display: block;
      font-size: 11px;
      opacity: 0.6;
      padding: 6px 10px;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      font-size: 12px;
    }

    .code-lang {
      opacity: 0.7;
    }

    .code-toggle {
      background: transparent;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    /* =========================
   折叠核心逻辑
========================= */

    /* 折叠状态 */
    .code-block pre {
      margin: 0;
      padding: 14px;
      overflow-x: auto;

      /* 🔥关键：允许纵向展开 */
      max-height: 600px;
      overflow-y: auto;

      transition: max-height 0.25s ease;
    }

    /* 折叠状态 */
    .code-block.collapsed pre {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      overflow: hidden;
    }

    .code-block pre code {
      white-space: pre;
      display: block;
    }

    .code-scroll {
      display: flex;
      max-height: 500px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas;
      font-size: 13px;
    }

    /* 行号列 */
    .code-linenums {
      background: rgba(255, 255, 255, 0.05);
      padding: 14px 8px;
      text-align: right;
      user-select: none;

      position: sticky;
      left: 0;
      /* 🔥关键：固定 */
    }

    /* 每一行 */
    .line-num {
      height: 20px;
      opacity: 0.4;
    }

    /* 代码列 */
    .code-content {
      padding: 14px;
      white-space: pre;
      min-width: 100%;
    }

    /* 每行对齐 */
    .line-text {
      height: 20px;
      white-space: pre;
    }

    /* 折叠 */
    .code-block.collapsed .code-scroll {
      max-height: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="bg"></div>
  <div id="stars"></div>

  <header>
    <button class="home" onclick="location.href='https://zyq1569.github.io/'"> 主頁 </button>
    <input id="search" placeholder="搜索文章..." />
    <select id="category"></select>
    <select id="sort">
      <option value="new">最新</option>
      <option value="old">最旧</option>
    </select>
    <!-- ✅ 新增 Home 按钮 -->
    <button class="home" onclick="goHome()">返回</button>
  </header>



  <!-- LIST -->
  <div id="app"></div>

  <!-- DETAIL -->
  <div id="detail"></div>

  <script>
    let DB = null;
    let current = null;

    /* =========================
     LOAD JSON
  ========================= */
    fetch("./data/tech.json")
      .then((r) => r.json())
      .then((d) => {
        DB = d;
        init();
      });

    /* =========================
     STAR EFFECT
  ========================= */
    const starBox = document.getElementById("stars");
    for (let i = 0; i < 120; i++) {
      const s = document.createElement("div");
      s.className = "star";
      s.style.top = Math.random() * 100 + "%";
      s.style.left = Math.random() * 100 + "%";
      s.style.animationDuration = 2 + Math.random() * 3 + "s";
      starBox.appendChild(s);
    }

    /* =========================
     INIT
  ========================= */
    function init() {
      const cat = document.getElementById("category");

      const cats = ["All", ...new Set(DB.pages.map((p) => p.category))];
      cat.innerHTML = cats
        .map((c) => `<option value="${c}">${c}</option>`)
        .join("");

      renderList();
    }

    /* =========================
     LIST RENDER
  ========================= */
    function renderList() {
      document.getElementById("app").style.display = "grid";
      document.getElementById("detail").style.display = "none";

      let list = [...DB.pages];

      const q = search.value;
      const c = category.value;
      const s = sort.value;

      if (c !== "All") list = list.filter((i) => i.category === c);
      if (q) list = list.filter((i) => i.title.includes(q));

      list.sort((a, b) => (s === "new" ? b.id - a.id : a.id - b.id));

      const app = document.getElementById("app");
      app.innerHTML = "";

      list.forEach((p) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.summary}</p>
      <small>${p.category}</small>
    `;
        div.onclick = () => openPage(p.id);
        app.appendChild(div);
      });
    }

    /* =========================
     OPEN PAGE
  ========================= */
    function openPage(id) {
      const page = DB.pages.find((p) => p.id === id);
      if (!page) return;

      current = page;

      /* =========================
       切换视图
    ========================= */
      document.getElementById("app").style.display = "none";
      const detail = document.getElementById("detail");
      detail.style.display = "block";

      detail.innerHTML = "";

      /* =========================
       TITLE
    ========================= */
      const title = document.createElement("h1");
      title.textContent = page.title;
      detail.appendChild(title);

      /* =========================
       BLOCK RENDER ENGINE
    ========================= */
      page.blocks.forEach((block) => {
        const el = renderBlock(block);
        detail.appendChild(el);
      });
    }
    function renderBlock(b) {

      const el = document.createElement("div");
      el.className = "block";

      if (b.type === "text") {

        el.innerHTML = `<p class="text-block">${b.value}</p>`;

      } else if (b.type === "subtitle") {

        el.innerHTML = `<h3 class="subtitle-block">${b.value}</h3>`;

      } else if (b.type === "image") {

        const wrap = document.createElement("div");
        wrap.className = "single-media";

        wrap.innerHTML =
          `<img src="${b.value}" loading="lazy">`;

        el.appendChild(wrap);

      } else if (b.type === "video") {

        const wrap = document.createElement("div");
        wrap.className = "single-media";

        wrap.innerHTML =
          `<video controls src="${b.value}"></video>`;

        el.appendChild(wrap);

      } else if (b.type === "link") {

        el.innerHTML =
          `<a href="${b.value}" target="_blank">${b.value}</a>`;

      } else if (b.type === "media-group") {

        const container = document.createElement("div");

        const count = b.items.length;

        if (count === 1) {
          container.className = "media-container column";
        } else {
          container.className = "media-container grid";
        }

        b.items.forEach(item => {

          const m = document.createElement("div");
          m.className = "media-item";

          if (item.type === "image") {
            m.innerHTML =
              `<img src="${item.value}" loading="lazy">`;
          }

          if (item.type === "video") {
            m.innerHTML =
              `<video controls src="${item.value}"></video>`;
          }

          container.appendChild(m);
        });

        el.appendChild(container);
      } else if (b.type === "code") {
        const wrap = document.createElement("div");
        wrap.className = "code-block";

        const header = document.createElement("div");
        header.className = "code-header";

        const btn = document.createElement("button");
        btn.className = "code-toggle";
        btn.textContent = "展开 / 折叠";

        const lang = document.createElement("span");
        lang.className = "code-lang";
        lang.textContent = b.lang || "code";

        /* =========================
           数据处理
        ========================= */
        const text = Array.isArray(b.value)
          ? b.value.join("\n")
          : (b.value || "");

        const lines = text.split("\n");

        /* =========================
           主滚动容器（关键）
        ========================= */
        const scroll = document.createElement("div");
        scroll.className = "code-scroll";

        /* 左侧行号 */
        const nums = document.createElement("div");
        nums.className = "code-linenums";

        /* 右侧代码 */
        const code = document.createElement("div");
        code.className = "code-content";

        /* =========================
           生成行号 + 代码
        ========================= */
        lines.forEach((line, i) => {

          const n = document.createElement("div");
          n.className = "line-num";
          n.textContent = i + 1;

          const c = document.createElement("div");
          c.className = "line-text";
          c.textContent = line;

          nums.appendChild(n);
          code.appendChild(c);
        });

        /* =========================
           结构组合
        ========================= */
        scroll.appendChild(nums);
        scroll.appendChild(code);

        header.appendChild(lang);
        header.appendChild(btn);

        wrap.appendChild(header);
        wrap.appendChild(scroll);

        /* 默认折叠 */
        wrap.classList.add("collapsed");

        btn.onclick = () => {
          wrap.classList.toggle("collapsed");
        };

        el.appendChild(wrap);
      }
      return el;
    }
    /* =========================
     BACK
  ========================= */
    function back() {
      renderList();
    }

    /* =========================
     EVENTS
  ========================= */
    search.oninput = renderList;
    category.onchange = renderList;
    sort.onchange = renderList;


    function goHome() {
      document.getElementById("detail").style.display = "none";
      document.getElementById("app").style.display = "grid";
      current = null;
    }
  </script>
</body>

</html>
