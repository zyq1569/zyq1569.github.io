<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        :root {
            /* ============== 背景亮度控制參數 ============== */
            --bg-darkness: 0.28;
            /* 主要黑暗度 (調小 = 更亮，建議範圍 0.3 ~ 0.65) */
            --gradient-top: rgba(20, 20, 35, var(--bg-darkness));
            --gradient-bottom: rgba(40, 40, 70, 0.38);
            /* 底部漸層透明度 */
            /* ============================================ */
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            /* 徹底禁用滾動 */
            overscroll-behavior: none;
            /* 禁用邊緣彈跳 */
            touch-action: none;
            /* 禁用手機觸控滑動 */
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Cinzel', serif;
            padding-top: 235px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景圖 - 可控亮度 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(to bottom, var(--gradient-top), var(--gradient-bottom)),
                url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1920&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
        }

        /* 光照效果 */
        .lightBeam {
            position: fixed;
            top: -30%;
            left: 10%;
            width: 420px;
            height: 160%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.42), transparent);
            filter: blur(50px);
            transform: rotate(12deg);
            animation: beamMove 14s infinite alternate ease-in-out;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes beamMove {
            from {
                left: 5%;
            }

            to {
                left: 62%;
            }
        }

        /* 頂部控制區 */
        .top-control {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(10px);
            padding: 14px 16px;
            width: 100%;
            max-width: 360px;
            border-bottom-right-radius: 16px;
        }

        .nav a {
            text-decoration: none;
            padding: 11px 16px;
            border-radius: 10px;
            color: #fff;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-size: 15.5px;
            display: flex;
            align-items: center;
            gap: 11px;
            margin-bottom: 7px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav a:hover {
            background: rgba(255, 170, 70, 0.45);
            transform: translateX(10px);
        }

        /* MP3 播放器 */
        .music-player {
            background: rgba(0, 0, 0, 0.28);
            border-radius: 10px;
            padding: 11px 13px;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* 主要內容區域 */
        .main-page,
        .content-page {
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 235px);
        }

        /* 主頁面 */
        .main-page {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 80px 20px;
        }

        /* 內容展示區 */
        #contentContainer {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 20000;
        }

        #contentContainer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 右上角關閉按鈕 */
        .closeBtn {
            position: fixed;
            top: 18px;
            right: 20px;
            z-index: 21000;
            padding: 12px 26px;
            background: #c00;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }

        .closeBtn:hover {
            background: #f00;
            transform: scale(1.05);
        }

        /* 星空粒子 */
        .star {

            position: absolute;

            border-radius: 50%;

            background: #fff;

            animation: twinkle infinite alternate;
        }

        @keyframes twinkle {

            from {
                opacity: 0.2;
            }

            to {
                opacity: 1;
            }
        }

        /* 手機端微調 */
        @media (max-width: 768px) {
            body {
                padding-top: 235px;
            }

            .top-control {
                max-width: 60%;
            }

            :root {
                --nav-item-height: 30px;
            }

            /* 手機端可在此單獨調整 */
        }
    </style>
</head>

<body>

    <div class="lightBeam"></div>

    <!-- 頂部控制區 -->
    <div class="top-control">
        <div class="nav" id="custom-nav"></div>

        <!-- MP3 播放器 -->
        <div class="music-player">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span id="song-title"
                    style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">未選擇歌曲</span>
                <div style="display:flex;gap:10px;">
                    <button id="prev-btn">上</button>
                    <button id="play-btn">▶</button>
                    <button id="next-btn">下</button>
                    <button id="shuffle-btn">🔀</button>
                    <button id="repeat-btn">🔁</button>
                    <a id="download-btn" href="#" download>⬇</a>
                </div>
            </div>

            <div id="progress-container"
                style="height:4px;background:rgba(255,255,255,0.22);border-radius:2px;cursor:pointer;margin:8px 0;">
                <div id="progress" style="height:100%;background:linear-gradient(to right,#ffaa00,#ffdd88);width:0%;">
                </div>
            </div>

            <div style="display:flex;justify-content:space-between;font-size:12.5px;">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>

            <select id="playlist-select"
                style="margin-top:8px;width:100%;background:rgba(30,30,30,0.7);color:#fff;border:none;border-radius:6px;padding:6px;">
            </select>
        </div>
    </div>

    <!-- 主頁面 -->
    <div class="main-page" id="mainPage">
        <p style="font-size:12px;letter-spacing:6px;margin-bottom:20px;text-shadow:0 0 30px rgba(255,255,255,0.75);">
            fgvpn17.apk安卓手机端 fg805p.zip电脑端</p>
        <p style="font-size:21px;">AI...No hope!</p>
    </div>

    <!-- 內容展示容器 -->
    <div id="contentContainer">
        <button class="closeBtn" onclick="closeContent()">✕ 關閉返回</button>
        <iframe id="pageFrame"></iframe>
    </div>

    <script>
        // ====================== 導航 ======================
        // 感恩！🎉🎆
        // 0:干净世界  <a href="https://www.ganjingworld.com/zh-CN" target="_blank">进入</a> https://www.njingworld.com/
        // 1.ChatGPT (可以免注册直接试用)： <a href="https://chat.openai.com/" target="_blank">链接进入</a>  https://chat.openai.com/
        // 2.google-Gemini的AI   <a href="https://aistudio.google.com/prompts/new_chat" target="_blank">链接进入</a> https://aistudio.google.com/prompts/new_chat
        // 3.马斯克的X的AI。     <a href="https://x.com/i/grok" target=_blank>链接进入</a> https://x.com/i/grok
        // 4.需要的网络工具-->fgvpn17.apk安卓手机端  fg805p.zip电脑端
        // <a href=" https://github.com/freegate-release/website" target="_blank">最新下载(使用中建议关闭其它软件)</a>
        // <a href=" https://github.com/freegate-release/website/tree/gh-pages/files" target="_blank">历史版本下载链接</a>
        // https://github.com/freegate-release/website/tree/gh-pages/files     https://git.io/vFUxz       
        // 备用下载地址：
        // <a href="https://sourceforge.net/projects/health1212/files/Tools/OS%20Software/windows%20tools/fg805p.7z/download" target="_blank">fg805p.7z</a>
        // https://sourceforge.net/projects/health1212/files/Tools/OS%20Software/windows%20tools/
        // <a href="https://sourceforge.net/projects/health1212/files/Tools/OS%20Software/windows%20tools/fgvpn_1.7.apk/download" target="_blank">fgvpn_1.7.apk</a>
        // https://sourceforge.net/projects/health1212/files/Tools/OS%20Software/windows%20tools/   

        const navItems = [
            { icon: "✨", text: "干净世界", href: "https://www.ganjingworld.com/zh-CN" },
            { icon: "🔥", text: "ChatGPT免注册试用", href: "https://chat.openai.com/" },
            { icon: "🌫️", text: "google-Gemini", href: "https://aistudio.google.com/prompts/new_chat" },
            { icon: "📖", text: "馬斯克X.AI", href: "https://x.com/i/grok" },
            { icon: "📜", text: "网络工具", href: "https://github.com/freegate-release/website" },
            { icon: "📜", text: "備用地址", href: "https://sourceforge.net/projects/health1212/files/Tools/OS%20Software/windows%20tools/fg805p.7z/download" }
        ];

        const navContainer = document.getElementById('custom-nav');
        navItems.forEach(item => {
            const a = document.createElement('a');
            a.innerHTML = `<span style="font-size:19px;">${item.icon}</span> ${item.text}`;
            a.onclick = () => window.open(item.href, '_blank');   // 新分頁打開 showContent(item.href);
            navContainer.appendChild(a);
        });

        function showContent(url) {
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('contentContainer').style.display = 'block';
            document.querySelector('.closeBtn').style.display = 'block';
            document.getElementById('pageFrame').src = url;
        }

        function closeContent() {
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('contentContainer').style.display = 'none';
            document.querySelector('.closeBtn').style.display = 'none';
            document.getElementById('pageFrame').src = '';
        }

        // ====================== MP3 播放器 ======================
        const playlist = [
            { title: "天音 1", src: "resource/dsg.mp3" },
            { title: "天音 2", src: "resource/tianyi.mp3" },
            { title: "天音 3", src: "resource/xiyuan.mp3" },
            { title: "天音 4", src: "resource/tsdyl.mp3" }
            // {title: "但丁．神曲 - 地獄序曲", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
            // {title: "煉獄之風", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
            // {title: "天堂聖詠", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"}
        ];

        let currentIndex = 0;
        let isPlaying = false;
        const audio = new Audio();

        const songTitleEl = document.getElementById('song-title');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress');
        const currentTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const playlistSelect = document.getElementById('playlist-select');
        const downloadBtn = document.getElementById('download-btn');

        playlist.forEach((song, i) => {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = song.title;
            playlistSelect.appendChild(opt);
        });

        function loadSong(index) {
            const wasPlaying = isPlaying;           // 記錄切換前的播放狀態
            currentIndex = index;
            audio.src = playlist[index].src;
            songTitleEl.textContent = playlist[index].title;
            playlistSelect.value = index;
            downloadBtn.href = playlist[index].src;
            downloadBtn.download = playlist[index].title + ".mp3";
            // 重點修正：如果原本正在播放，則自動播放新歌曲
            if (wasPlaying) {
                audio.play();
            }
        }

        playBtn.addEventListener('click', () => {
            if (!audio.src) loadSong(0);
            isPlaying = !isPlaying;
            isPlaying ? audio.play() : audio.pause();
            playBtn.textContent = isPlaying ? '❚❚' : '▶';
        });

        prevBtn.addEventListener('click', () => loadSong((currentIndex - 1 + playlist.length) % playlist.length));
        nextBtn.addEventListener('click', () => loadSong((currentIndex + 1) % playlist.length));

        playlistSelect.addEventListener('change', e => loadSong(parseInt(e.target.value)));

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressBar.style.width = (audio.currentTime / audio.duration * 100) + '%';
                currentTimeEl.textContent = `${Math.floor(audio.currentTime / 60)}:${(Math.floor(audio.currentTime % 60) + '').padStart(2, '0')}`;
                durationEl.textContent = `${Math.floor(audio.duration / 60)}:${(Math.floor(audio.duration % 60) + '').padStart(2, '0')}`;
            }
        });

        document.getElementById('progress-container').addEventListener('click', e => {
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = (e.clientX - rect.left) / rect.width * audio.duration;
        });

        audio.addEventListener('ended', () => loadSong((currentIndex + 1) % playlist.length));

        /* =========================================
           星空粒子
        ========================================= */

        for (let i = 0; i < 160; i++) {

            let s = document.createElement("div");

            s.className = "star";

            let size = Math.random() * 3 + 1;

            s.style.width = size + "px";
            s.style.height = size + "px";

            s.style.left = Math.random() * 100 + "vw";
            s.style.top = Math.random() * 300 + "vh";

            s.style.animationDuration =
                (1 + Math.random() * 4) + "s";

            s.style.opacity = Math.random();

            document.body.appendChild(s);
        }
    </script>
</body>

</html>
