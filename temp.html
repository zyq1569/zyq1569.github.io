    <script>
        // 星空粒子
        const starsCanvas = document.getElementById('stars');
        const starsCtx = starsCanvas.getContext('2d');
        let stars = [];

        class Star {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * starsCanvas.width;
                this.y = Math.random() * starsCanvas.height;
                this.size = Math.random() * 2.1 + 0.6;
                this.speed = Math.random() * 0.018 + 0.008;
                this.opacity = Math.random() * 0.6 + 0.4;
                this.breath = Math.random() * Math.PI * 2;
            }
            update() {
                this.breath += this.speed;
                this.opacity = 0.4 + Math.sin(this.breath) * 0.55;
            }
            draw() {
                starsCtx.save();
                starsCtx.globalAlpha = this.opacity;
                starsCtx.fillStyle = '#fff';
                starsCtx.shadowBlur = 9;
                starsCtx.shadowColor = '#a0d8ff';
                starsCtx.fillRect(this.x, this.y, this.size, this.size);
                starsCtx.restore();
            }
        }

        function resize() {
            starsCanvas.width = window.innerWidth;
            starsCanvas.height = window.innerHeight;
            const count = Math.floor(window.innerWidth * window.innerHeight / 7800);
            stars = [];
            for (let i = 0; i < count; i++) stars.push(new Star());
        }

        function animateStars() {
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
            stars.forEach(s => { s.update(); s.draw(); });
            requestAnimationFrame(animateStars);
        }

        // 手電筒
        const flashCanvas = document.getElementById('flashlight');
        const flashCtx = flashCanvas.getContext('2d');
        let mouseX = window.innerWidth * 0.35;
        let mouseY = window.innerHeight * 0.45;

        function resizeFlash() {
            flashCanvas.width = window.innerWidth;
            flashCanvas.height = window.innerHeight;
        }

        function drawFlash() {
            flashCtx.clearRect(0, 0, flashCanvas.width, flashCanvas.height);
            const g = flashCtx.createRadialGradient(mouseX, mouseY, 85, mouseX, mouseY, 520);
            g.addColorStop(0, 'rgba(255,245,220,0.15)');
            g.addColorStop(1, 'rgba(160,210,255,0)');
            flashCtx.fillStyle = g;
            flashCtx.fillRect(0, 0, flashCanvas.width, flashCanvas.height);
        }

        window.addEventListener('resize', () => {
            resize();
            resizeFlash();
        });

        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('touchmove', e => {
            if (e.touches[0]) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });

        window.onload = () => {
            resize();
            resizeFlash();
            animateStars();
            setInterval(drawFlash, 16);
        };
    </script>
