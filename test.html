<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Null2Live - 集成测试版2</title>
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            image-rendering: crisp-edges;
            transform: translateZ(0);
        }
    </style>
</head>
<body>
    <div class="top-link">
        <a href="https://zyq1569.github.io/all" target="_blank">1.天.地.人</a>
    </div>
    <div class="bottom-link">
        <a href="https://zyq1569.github.io/health" target="_blank">2.科技.AI</a>
    </div>

    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        let w, h, cx, cy;

        function resize() {
            w = canvas.width = innerWidth * devicePixelRatio;
            h = canvas.height = innerHeight * devicePixelRatio;
            canvas.style.width = innerWidth + "px";
            canvas.style.height = innerHeight + "px";
            cx = w / 2;
            cy = h / 2;
            if (/Mobi|Android|iPhone/.test(navigator.userAgent)) {
                cy = h / 2 - h * 0.06;
            }
        }
        window.addEventListener("resize", resize);
        resize();

        let rotation = 0;
        let last = performance.now();

        function draw(time) {
            const dt = (time - last) * 0.001;
            last = time;
            rotation += dt * 0.008;

            // 背景
            ctx.fillStyle = "#05080f";
            ctx.fillRect(0, 0, w, h);

            // ==================== 银河部分（中等复杂度） ====================
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(-0.32);
            ctx.rotate(rotation);

            // 蓝色星云
            const nebula = ctx.createRadialGradient(0, 0, 0, 0, 0, GALAXY_RADIUS * 1.3);
            nebula.addColorStop(0, "rgba(100,160,255,0.18)");
            nebula.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = nebula;
            ctx.beginPath();
            ctx.ellipse(0, 0, GALAXY_RADIUS * 1.35, GALAXY_RADIUS * 0.36, 0, 0, Math.PI * 2);
            ctx.fill();

            // 银河核心
            const core = ctx.createRadialGradient(0, 0, 0, 0, 0, GALAXY_RADIUS * 0.25);
            core.addColorStop(0, "rgba(255,240,200,0.9)");
            core.addColorStop(1, "rgba(255,180,100,0)");
            ctx.fillStyle = core;
            ctx.beginPath();
            ctx.ellipse(0, 0, GALAXY_RADIUS * 0.25, GALAXY_RADIUS * 0.1, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // ==================== 时钟（可靠版本） ====================
            const clockRadius = Math.min(w, h) * 0.39;
            const blinkCycle = 15000;
            const blinkTime = time % blinkCycle;
            let clockAlpha = 0;

            if (blinkTime < 12000) {
                if (blinkTime < 800) clockAlpha = blinkTime / 800;
                else if (blinkTime > 11200) clockAlpha = 1 - (blinkTime - 11200) / 800;
                else clockAlpha = 1;
            }

            if (clockAlpha > 0.03) {
                ctx.save();
                ctx.translate(cx, cy);

                // 外圈
                ctx.strokeStyle = `rgba(120,180,255,${0.25 * clockAlpha})`;
                ctx.lineWidth = 7;
                ctx.shadowBlur = 16 * clockAlpha;
                ctx.shadowColor = "#70a8ff";
                ctx.beginPath();
                ctx.arc(0, 0, clockRadius, 0, Math.PI * 2);
                ctx.stroke();

                // 12数字
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.shadowBlur = 10 * clockAlpha;
                ctx.fillStyle = `rgba(255,255,255,${0.95 * clockAlpha})`;
                ctx.font = `${Math.floor(clockRadius * 0.09)}px "-apple-system", sans-serif`;
                for (let i = 1; i <= 12; i++) {
                    const a = Math.PI * 2 * i / 12 - Math.PI / 2;
                    ctx.fillText(i.toString(), Math.cos(a) * (clockRadius - 46), Math.sin(a) * (clockRadius - 46));
                }

                // 时辰
                const shichen = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
                ctx.fillStyle = `rgba(120,180,255,${0.85 * clockAlpha})`;
                ctx.font = `${Math.floor(clockRadius * 0.058)}px "-apple-system", sans-serif`;
                for (let i = 0; i < 12; i++) {
                    const a = Math.PI * 2 * i / 12 - Math.PI / 2;
                    ctx.fillText(shichen[i], Math.cos(a) * (clockRadius - 76), Math.sin(a) * (clockRadius - 76));
                }

                // 春夏秋冬
                ctx.shadowBlur = 15 * clockAlpha;
                ctx.font = `${Math.floor(clockRadius * 0.085)}px "-apple-system", sans-serif`;
                const seasons = [
                    {t:"春", a:-Math.PI/2, c:"#80ffaa"},
                    {t:"夏", a:0, c:"#ffaa80"},
                    {t:"秋", a:Math.PI/2, c:"#ffdd80"},
                    {t:"冬", a:Math.PI, c:"#a0d0ff"}
                ];
                for (let s of seasons) {
                    ctx.shadowColor = s.c;
                    ctx.fillStyle = s.c;
                    const r = clockRadius + 30;
                    ctx.fillText(s.t, Math.cos(s.a) * r, Math.sin(s.a) * r);
                }

                ctx.restore();
            }

            requestAnimationFrame(draw);
        }

        const GALAXY_RADIUS = Math.min(innerWidth, innerHeight) * 0.38;   // 全局定义
        requestAnimationFrame(draw);
    </script>
</body>
</html>
