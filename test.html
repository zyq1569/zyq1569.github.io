<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星辰記事</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat fixed;
            color: #e0f2fe;
            min-height: 100vh;
        }
        
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .star {
            position: absolute; background: white; border-radius: 50%;
            box-shadow: 0 0 8px #fff, 0 0 15px #a5b4fc;
            animation: twinkle 4s infinite alternate ease-in-out;
        }
        @keyframes twinkle { 
            0% { opacity: 0.4; transform: scale(0.8); } 
            100% { opacity: 1; transform: scale(1.2); } 
        }
        
        .article-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(12px); 
        }
        .article-card:hover { 
            transform: translateY(-12px); 
        }

        /* 左上角即時時間 - 完全透明 */
        #realtime-clock {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            background: transparent;
            color: rgba(224, 242, 254, 0.85);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="relative">
    <div class="stars" id="stars"></div>

    <!-- 左上角即時時間（完全透明） -->
    <div id="realtime-clock">
        <i class="fa-solid fa-clock text-indigo-300"></i>
        <span id="clock-time"></span>
    </div>

    <div class="relative z-10">
        <header class="border-b border-white/10 bg-black/40 backdrop-blur-md sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-moon text-3xl text-indigo-400"></i>
                    <h1 class="text-3xl font-bold">星辰記事</h1>
                </div>
                <input id="searchInput" type="text" placeholder="搜尋文章..." 
                       class="w-96 bg-slate-900/70 border border-slate-600 rounded-2xl px-5 py-3 focus:outline-none focus:border-indigo-400"
                       onkeyup="filterArticles()">
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 py-10">
            <h2 class="text-4xl font-semibold mb-8">最新文章</h2>
            <div id="articlesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </main>
    </div>

    <script>
        let articles = [];

        async function loadArticles() {
            try {
                const res = await fetch('articles.json');
                const data = await res.json();
                articles = data.articles;
                renderArticles(articles);
            } catch (e) {
                console.error("載入文章失敗", e);
            }
        }

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = star.style.height = `${size}px`;
                star.style.left = `${Math.random()*100}%`;
                star.style.top = `${Math.random()*100}%`;
                star.style.animationDelay = `-${Math.random()*4}s`;
                container.appendChild(star);
            }
        }

        // 即時時間顯示（左上角完全透明）
        function updateRealTime() {
            const clockEl = document.getElementById('clock-time');
            setInterval(() => {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const date = String(now.getDate()).padStart(2, '0');
                const weekDays = ['日','一','二','三','四','五','六'];
                const week = weekDays[now.getDay()];
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');

                clockEl.textContent = `${year}年${month}月${date}日 星期${week} ${hours}:${minutes}:${seconds}`;
            }, 1000);
        }

        function renderArticles(data) {
            const container = document.getElementById('articlesContainer');
            container.innerHTML = '';
            data.forEach(article => {
                const card = `
                <div onclick="goToArticle(${article.id})" class="article-card rounded-3xl overflow-hidden cursor-pointer group">
                    <img src="${article.image}" class="w-full h-56 object-cover transition-transform group-hover:scale-105">
                    <div class="p-6">
                        <div class="flex justify-between text-xs mb-3 text-slate-400">
                            <span>${article.date}</span>
                            <span>${article.readTime}</span>
                        </div>
                        <h3 class="font-semibold text-xl mb-3 line-clamp-2">${article.title}</h3>
                        <p class="text-slate-400 text-sm line-clamp-3">${article.excerpt}</p>
                    </div>
                </div>`;
                container.innerHTML += card;
            });
        }

        function filterArticles() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = articles.filter(a => 
                a.title.toLowerCase().includes(term) || a.excerpt.toLowerCase().includes(term)
            );
            renderArticles(filtered.length ? filtered : articles);
        }

        function goToArticle(id) {
            window.location.href = `article.html?id=${id}`;
        }

        // 初始化
        window.onload = () => {
            createStars();
            updateRealTime();     // ← 新增即時時間
            loadArticles();
        };
    </script>
</body>
</html>
